<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense V15 - Hotkeys Edition</title>
    <style>
        /* === ESTILOS GLOBALES === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            background-image: radial-gradient(circle at center, #222 0%, #000 100%);
            color: #fff;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            touch-action: none; 
        }

        /* === LAYOUT PRINCIPAL (Bloque unificado y pegado) === */
        #game-layout {
            display: flex;
            flex-direction: row;
            background-color: #252525;
            border-radius: 12px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
            overflow: hidden;
            height: 95vh; 
            max-height: 750px; 
        }
        
        #game-layout.left-hud {
            flex-direction: row-reverse; 
        }

        /* === CONTENEDOR DEL MAPA === */
        #canvas-wrapper {
            height: 100%;
            aspect-ratio: 4 / 3; 
            background-color: #1a1a1a;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* === PANEL LATERAL FIJO === */
        #ui-side-panel {
            width: 280px; 
            height: 100%;
            background-color: #2a2a2a;
            border-left: 2px solid #444;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
            overflow-y: auto;
        }
        #game-layout.left-hud #ui-side-panel {
            border-left: none;
            border-right: 2px solid #444;
        }

        /* --- Controles Superiores --- */
        .top-controls { display: flex; gap: 8px; margin-bottom: 15px; }
        .icon-btn {
            background: linear-gradient(145deg, #444, #333); color: white;
            font-weight: bold; font-size: 14px; padding: 10px; border: 1px solid #666;
            border-radius: 8px; cursor: pointer; flex: 1;
        }
        .icon-btn:hover { background: linear-gradient(145deg, #555, #444); }
        .icon-btn.active-pause { background: linear-gradient(145deg, #FFC107, #FF9800); color: black; border-color: #fff; }

        /* --- Panel Dinámico de Mejoras --- */
        #upgrade-panel {
            background: rgba(40, 20, 0, 0.8); padding: 10px; border-radius: 8px; 
            border: 2px solid #ff9800; text-align: center; margin-bottom: 15px; display: none;
        }
        .upgrade-btn-row { display: flex; gap: 5px; margin-top: 10px; }

        /* --- Cajas de Estadísticas --- */
        .stats-box {
            background: rgba(0, 0, 0, 0.4); padding: 12px; border-radius: 10px;
            border: 1px solid #444; margin-bottom: 15px;
        }
        .stat-item { font-size: 16px; font-weight: bold; margin: 5px 0; display: flex; justify-content: space-between;}
        .stat-item span:last-child { color: #FFD700; text-align: right;}
        .stat-item.lives span:last-child { color: #FF5252; }

        /* --- Cuadrícula de Torres --- */
        .panel-title { margin: 0 0 10px 0; font-size: 15px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 5px; color: #ddd; }
        .tower-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        button.tower-btn {
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a); color: white; border: 1px solid #555; 
            padding: 8px 5px; border-radius: 8px; cursor: pointer; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 12px; transition: 0.1s;
            position: relative;
        }
        /* Indicador de atajo de teclado [1], [2], etc */
        .hotkey-badge {
            position: absolute; top: 2px; left: 2px; background: rgba(0,0,0,0.6); color: #ccc;
            font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold;
        }
        button.tower-btn .t-icon { font-size: 22px; margin-bottom: 2px;}
        button.tower-btn:hover { background: linear-gradient(145deg, #4a4a4a, #3a3a3a); transform: translateY(-2px); }
        button.tower-btn.selected { background: linear-gradient(145deg, #1976D2, #1565C0); border: 2px solid #fff; box-shadow: 0 0 10px #1976D2; }

        /* --- Botones de Acción Globales --- */
        .action-btn { color: white; border: 1px solid #fff; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; margin-bottom: 8px;}
        .action-btn.start { background: linear-gradient(145deg, #4CAF50, #388E3C); }
        .action-btn.rush { background: linear-gradient(145deg, #E53935, #C62828); position: relative; }
        .hotkey-badge-space { position: absolute; right: 5px; top: 50%; transform: translateY(-50%); font-size: 10px; background: rgba(0,0,0,0.5); padding: 2px 5px; border-radius: 4px;}
        .action-btn.upgrade-all { background: linear-gradient(145deg, #8E24AA, #6A1B9A); }

        /* === TEXTO DE PAUSA === */
        #pause-indicator {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: bold; color: rgba(255,255,255,0.9); z-index: 5; pointer-events: none;
            text-shadow: 0 0 30px rgba(0,0,0,1); letter-spacing: 5px;
        }

        /* === MODALES === */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 12px; border: 2px solid #555;
            width: 400px; max-width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
        }
        .modal-content h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px;}

        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 13px;}
        
        .btn-group { display: flex; gap: 5px; }
        .btn-group button { flex: 1; padding: 10px 5px; background: #444; color: white; border: 1px solid #666; border-radius: 5px; cursor: pointer; font-size: 13px; }
        .btn-group button.active { background: #2196F3; font-weight: bold; border-color: #fff; }
        .btn-group button.hard.active { background: #E53935; }
        .btn-group button.bug.active { background: #9C27B0; }
        
        .lang-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }

        .toggle-btn { background: #444; color: white; border: 1px solid #666; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: #FF9800; border-color: #fff; color: #000; }

        .close-modal-btn { background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; border: 1px solid #fff; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }

        #game-over-overlay h1 { color: #F44336; font-size: 45px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; text-align: center;}
        #hard-death-text { color: #ff9800; font-size: 15px; margin-bottom: 25px; display: none; text-align: center;}
    </style>
</head>
<body>

<div id="game-layout">
    
    <div id="canvas-wrapper">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="pause-indicator">PAUSA</div>
    </div>

    <div id="ui-side-panel">
        
        <div class="top-controls">
            <button id="btn-pause" class="icon-btn" onclick="togglePause()">⏸️ <span id="t-pause">Pausa</span></button>
            <button id="btn-settings" class="icon-btn" onclick="openSettings()">⚙️ <span id="t-settings-btn">Ajustes</span></button>
        </div>

        <div id="upgrade-panel">
            <h3 class="panel-title" id="t-selected" style="color:white; font-size:14px;">Torre Seleccionada</h3>
            <div style="font-size:13px;"><span id="t-lvl">Nvl:</span> <b id="tower-lvl" style="color:#FFD700"></b> | <span id="t-dmg">Daño:</span> <b id="tower-dmg" style="color:#FF5252"></b></div>
            <div class="upgrade-btn-row">
                <button id="upgrade-btn" class="action-btn" onclick="upgradeSelectedTower()" style="background: linear-gradient(145deg, #FF9800, #F57C00); color: black; flex:1; padding:8px; font-size:12px; margin:0;"></button>
                <button id="upgrade-max-btn" class="action-btn" onclick="maxUpgradeSelectedTower()" style="background: linear-gradient(145deg, #D32F2F, #B71C1C); color: white; flex:1; padding:8px; font-size:12px; margin:0;"></button>
            </div>
        </div>

        <div class="stats-box">
            <div class="stat-item"><span id="t-wave-short">Oleada:</span> <span id="wave-display">0</span></div>
            <div class="stat-item lives"><span id="t-lives">Vidas:</span> <span id="lives-display">20 💖</span></div>
            <div class="stat-item"><span id="t-gold">Oro:</span> <span id="gold-display">150 💰</span></div>
        </div>

        <h3 class="panel-title" id="t-build">Construir Torres</h3>
        <div class="tower-grid">
            <button id="btn-basic" class="tower-btn" onclick="selectTower('basic')"></button>
            <button id="btn-laser" class="tower-btn" onclick="selectTower('laser')"></button>
            <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')"></button>
            <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')"></button>
            <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')"></button>
            <button id="btn-titan" class="tower-btn" onclick="selectTower('titan')"></button>
        </div>

        <div style="margin-top: auto;">
            <button id="next-wave-btn" class="action-btn start" onclick="startWave()"></button>
            <button id="rush-wave-btn" class="action-btn rush" onclick="rushWave()">¡De golpe! <span class="hotkey-badge-space">SPACE</span></button>
            <button id="upgrade-all-btn" class="action-btn upgrade-all" onclick="upgradeAllTowers()"></button>
        </div>

    </div>
</div>

<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="t-settings-title">Configuración</h2>
        
        <div class="setting-group">
            <label id="t-lang">🌐 Idiomas / Languages</label>
            <div class="btn-group lang-grid">
                <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
                <button id="lang-en" onclick="setLanguage('en')">EN</button>
                <button id="lang-ja" onclick="setLanguage('ja')">JA</button>
                <button id="lang-de" onclick="setLanguage('de')">DE</button>
                <button id="lang-zh" onclick="setLanguage('zh')">ZH</button>
            </div>
        </div>

        <div class="setting-group">
            <label id="t-ui-pos">Posición de Interfaz</label>
            <div class="btn-group">
                <button id="btn-pos-right" class="active" onclick="setHUDPosition('right')">Derecha (V14)</button>
                <button id="btn-pos-left" onclick="setHUDPosition('left')">Izquierda</button>
            </div>
        </div>

        <div class="setting-group">
            <label id="t-map">🗺️ Mapa (Reinicia partida)</label>
            <div class="btn-group">
                <button id="btn-map1" class="active" onclick="setMap(0)">1 (Verde)</button>
                <button id="btn-map2" onclick="setMap(1)">2 (Arena)</button>
                <button id="btn-map3" onclick="setMap(2)">3 (Hielo)</button>
                <button id="btn-map4" onclick="setMap(3)">4 (Lava)</button>
            </div>
        </div>

        <div class="setting-group">
            <label id="t-diff">💀 Dificultad (Reinicia)</label>
            <div class="btn-group">
                <button id="btn-normal" class="active" onclick="setDifficulty('normal')">Normal</button>
                <button id="btn-hard" class="hard" onclick="setDifficulty('hard')">Hard</button>
                <button id="btn-bug" class="bug" onclick="setDifficulty('bug')">Bug</button>
            </div>
        </div>

        <div class="setting-group">
            <label id="t-accessibility">Accesibilidad</label>
            <button id="btn-colorblind" class="toggle-btn" onclick="toggleColorblind()">👁️ Modo Daltónico: OFF</button>
        </div>

        <button class="close-modal-btn" onclick="closeSettings()" id="t-close">Cerrar</button>
    </div>
</div>

<div id="game-over-overlay" class="modal-overlay">
    <div class="modal-content">
        <h1 id="t-game-over-title">Terminado</h1>
        <p id="game-over-text" style="font-size: 20px; font-weight:bold;"></p>
        <p id="hard-death-text">Modo Hard: Sin mejoras permanentes.</p>
        <button id="play-again-btn" onclick="restartFromGameOver()">Volver a jugar</button>
    </div>
</div>

    let permanentUpgrades = { bonusGold: 0, bonusLives: 0, freeTower: null };

    function loadProgress() {
        let saved = localStorage.getItem('td_permanentUpgrades_v15');
        if (!saved) {
            saved = localStorage.getItem('td_permanentUpgrades_v14') || localStorage.getItem('td_permanentUpgrades_v7');
            if(saved) localStorage.setItem('td_permanentUpgrades_v15', saved);
        }
        if (saved) permanentUpgrades = JSON.parse(saved);
        
        const cbSaved = localStorage.getItem('td_colorblind');
        if (cbSaved) isColorblindMode = cbSaved === 'true';

        const hudSaved = localStorage.getItem('td_hudPos');
        if (hudSaved) {
            hudPosition = hudSaved;
            updateHUDPositionVisual();
        }
    }
    
    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades_v15', JSON.stringify(permanentUpgrades));

    };

    const enemyDefinitions = {
        normal: { hp: 50, speed: 1.2, color: '#F44336', cbColor: '#DC3220', radius: 12, reward: 10, shape: 'circle' },
        fast:   { hp: 30, speed: 2.5, color: '#FF9800', cbColor: '#E66100', radius: 10, reward: 15, shape: 'triangle' },
        tank:   { hp: 150, speed: 0.7, color: '#8B0000', cbColor: '#5D3A9B', radius: 16, reward: 25, shape: 'square' },
        boss:   { hp: 1000, speed: 0.5, color: '#000000', cbColor: '#000000', radius: 25, reward: 150, shape: 'star' },
        mutant: { hp: 1500, speed: 1.5, color: '#8BC34A', cbColor: '#40B0A6', radius: 14, reward: 50, shape: 'diamond' },
        phantom:{ hp: 800, speed: 3.0, color: '#E0E0E0', cbColor: '#999999', radius: 10, reward: 40, shape: 'triangle' },
        mecha:  { hp: 3500, speed: 0.6, color: '#607D8B', cbColor: '#1A85FF', radius: 18, reward: 60, shape: 'square' },
        omega_boss: { hp: 20000, speed: 0.4, color: '#4A148C', cbColor: '#D41159', radius: 35, reward: 500, shape: 'star' }
    };

    // === ATAJOS DE TECLADO Y CONTROLES ===
    document.addEventListener('keydown', (e) => {
        // Ignorar si estamos en un modal abierto o si el juego está pausado/terminado
        if (e.key === 'Escape') {
            if (document.getElementById('settings-modal').style.display === 'flex') closeSettings();
            else togglePause();
            return;
        }
        
        if (isPaused || (isGameOver && gameMode !== 'bug')) return;

        // Spacebar -> Rush Wave
        if (e.code === 'Space') {
            e.preventDefault(); // Evita que la página haga scroll al presionar espacio
            rushWave();
        }
        
        // Números -> Seleccionar Torre
        if (e.key === '1') selectTower('basic');
        if (e.key === '2') selectTower('laser');
        if (e.key === '3') selectTower('rapid');
        if (e.key === '4') selectTower('sniper');
        if (e.key === '5') selectTower('heavy');
        if (e.key === '6') selectTower('titan');
    });

    function openSettings() {
        if (!isPaused && !isGameOver) togglePause();
        document.getElementById('settings-modal').style.display = 'flex';
        updateSettingsUI();
    }
    
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[id^="lang-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('lang-' + lang).classList.add('active');
        updateUI();
        updateSettingsUI();
    }

    function toggleColorblind() {
        isColorblindMode = !isColorblindMode;
        saveProgress();
        updateSettingsUI();
    }

    function setHUDPosition(pos) {
        hudPosition = pos;
        saveProgress();
        updateHUDPositionVisual();
        updateSettingsUI();
    }

    function updateHUDPositionVisual() {
        const layout = document.getElementById('game-layout');
        if (hudPosition === 'left') layout.classList.add('left-hud');
        else layout.classList.remove('left-hud');
    }

    function updateSettingsUI() {
        const text = dict[currentLang];
        document.getElementById('t-settings-title').innerText = text.settingsTitle;
        document.getElementById('t-lang').innerText = text.lang;
        document.getElementById('t-map').innerText = text.map;
        document.getElementById('t-diff').innerText = text.diff;
        document.getElementById('t-accessibility').innerText = text.accessibility;
        document.getElementById('t-close').innerText = text.close;
        document.getElementById('t-ui-pos').innerText = text.uiPos;
        
        document.getElementById('btn-map1').innerText = text.map1;
        document.getElementById('btn-map2').innerText = text.map2;
        document.getElementById('btn-map3').innerText = text.map3;
        document.getElementById('btn-map4').innerText = text.map4;
        
        document.getElementById('btn-normal').innerText = text.normal;
        document.getElementById('btn-hard').innerText = text.hard;
        document.getElementById('btn-bug').innerText = text.bugMode;

        document.getElementById('btn-pos-right').innerText = text.uiRight;
        document.getElementById('btn-pos-left').innerText = text.uiLeft;
        document.querySelectorAll('[id^="btn-pos-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-pos-' + hudPosition).classList.add('active');

        const cbBtn = document.getElementById('btn-colorblind');
        cbBtn.innerText = isColorblindMode ? text.cbOn : text.cbOff;
        cbBtn.className = isColorblindMode ? 'toggle-btn active' : 'toggle-btn';
    }

    function togglePause() {
        if (isGameOver && gameMode !== 'bug') return; 
        isPaused = !isPaused;
        const btn = document.getElementById('btn-pause');
        const overlay = document.getElementById('pause-indicator');
        
        if (isPaused) {
            btn.innerHTML = `▶️ <span id="t-pause">${dict[currentLang].resume}</span>`;
            btn.classList.add('active-pause');
            overlay.style.display = 'block';
            overlay.innerText = dict[currentLang].pausedText;
        } else {
            btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;
            btn.classList.remove('active-pause');
            overlay.style.display = 'none';
        }
    }

    function setMap(index) {
        currentMapIndex = index;
        document.querySelectorAll('[id^="btn-map"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-map' + (index+1)).classList.add('active');
        saveProgress(); resetGame(true); closeSettings();
    }

    function setDifficulty(mode) {
        gameMode = mode;
        document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        saveProgress(); resetGame(true); closeSettings();
    }

    function updateUI() {
        const text = dict[currentLang];
        
        if(document.getElementById('t-pause')) document.getElementById('t-pause').innerText = isPaused ? text.resume : text.pause;
        if(document.getElementById('pause-indicator')) document.getElementById('pause-indicator').innerText = text.pausedText;
        document.getElementById('t-settings-btn').innerText = text.settingsBtn;

        document.getElementById('t-wave-short').innerText = text.waveShort;
        document.getElementById('t-lives').innerText = text.lives;
        document.getElementById('t-gold').innerText = text.gold;
        document.getElementById('t-build').innerText = text.build;
        
        // Función para renderizar los botones de torres con sus atajos [1-6]
        function formatBtn(def, name, hotkey) {
            return `<span class="hotkey-badge">[${hotkey}]</span><div class="t-icon">${def.icon}</div><div>${name}</div><div style="font-size:11px; color:#aaa;">$${def.cost}</div>`;
        }

        document.getElementById('btn-basic').innerHTML = formatBtn(towerDefinitions.basic, text.basic, 1);
        document.getElementById('btn-laser').innerHTML = formatBtn(towerDefinitions.laser, text.laser, 2);
        document.getElementById('btn-rapid').innerHTML = formatBtn(towerDefinitions.rapid, text.rapid, 3);
        document.getElementById('btn-sniper').innerHTML = formatBtn(towerDefinitions.sniper, text.sniper, 4);
        document.getElementById('btn-heavy').innerHTML = formatBtn(towerDefinitions.heavy, text.heavy, 5);
        
        const titanCount = towers.filter(t => t.type === 'titan').length;
        document.getElementById('btn-titan').innerHTML = formatBtn(towerDefinitions.titan, text.titan, 6) + `<div style="font-size:11px; color:#ff9800;">(${titanCount}/3)</div>`;
        
        document.getElementById('next-wave-btn').innerText = text.startWave;
        document.getElementById('rush-wave-btn').innerHTML = `${text.rushWave} <span class="hotkey-badge-space">SPACE</span>`;
        document.getElementById('upgrade-all-btn').innerText = text.upgradeAll;
        
        document.getElementById('t-selected').innerText = text.selected;
        document.getElementById('t-lvl').innerText = text.lvl;
        document.getElementById('t-dmg').innerText = text.dmg;

        document.getElementById('t-game-over-title').innerText = text.gameOverTitle;
        document.getElementById('play-again-btn').innerText = text.playAgain;
        document.getElementById('hard-death-text').innerText = text.hardDeath;

        document.getElementById('gold-display').innerText = gold + " 💰";
        document.getElementById('lives-display').innerText = lives + " 💖";
        document.getElementById('wave-display').innerText = wave;
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            
            const mapMult = maps[currentMapIndex].dmgMult;
            const actualDmg = Math.floor(selectedTowerInstance.damage * mapMult);
            document.getElementById('tower-dmg').innerText = `${actualDmg} (${mapMult !== 1 ? (mapMult>1?'+25%':'-25%') : 'Base'})`;
            
            document.getElementById('upgrade-btn').innerText = text.btnUpgrade + ` ($${selectedTowerInstance.getUpgradeCost()})`;
            document.getElementById('upgrade-max-btn').innerText = text.btnMax;
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function selectTower(type) {
        if(type === 'titan') {
            const titanCount = towers.filter(t => t.type === 'titan').length;
            if(titanCount >= 3) return; // Limite de 3
        }

        selectedTowerType = type;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        if (type) document.getElementById('btn-' + type).classList.add('selected');
        selectedTowerInstance = null; 
        updateUI();
    }

    function isPointOnPath(px, py) {
        const pathPoints = maps[currentMapIndex].points;
        const safeMargin = 22.5 + 15; 
        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i]; const p2 = pathPoints[i+1];
            const l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
            if (l2 === 0) continue;
            let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projX = p1.x + t * (p2.x - p1.x); const projY = p1.y + t * (p2.y - p1.y);
            if (Math.hypot(px - projX, py - projY) < safeMargin) return true; 
        }
        return false;
    }

    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.radius = this.def.radius;
            this.reward = Math.floor(this.def.reward * maps[currentMapIndex].goldMult);
            this.waypointIndex = 0;
            const currentPath = maps[currentMapIndex].points;
            this.x = currentPath[0].x; this.y = currentPath[0].y;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.beginPath();
            if (isColorblindMode && this.def.shape !== 'circle') {
                if (this.def.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y + this.radius);
                } else if (this.def.shape === 'square') {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                } else if (this.def.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y); ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
                } else if (this.def.shape === 'star') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                }
            } else { ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); }
            ctx.fill();
            ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen'; ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }
        update() {
            const currentPath = maps[currentMapIndex].points;
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;
            const dx = target.x - this.x; const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.x = target.x; this.y = target.y; this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--; this.hp = 0; updateUI();
                    if (lives <= 0) {
                        if (gameMode === 'bug') handleGameOver(); 
                        else if (!isGameOver) handleGameOver(); 
                    }
                }
            } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; 
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) { gold -= cost; this.level++; this.damage *= 1.3; this.range *= 1.05; return true; } return false;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            ctx.fillStyle = 'white'; ctx.font = '16px Arial'; ctx.textAlign = 'center';
            ctx.fillText(this.def.icon, this.x, this.y + 6);
            ctx.font = 'bold 10px Arial'; ctx.fillStyle = 'white';
            ctx.fillText("L" + this.level, this.x + 10, this.y + 14);
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    const pColor = isColorblindMode ? this.def.cbColor : this.def.color;
                    const finalDamage = this.damage * maps[currentMapIndex].dmgMult;
                    projectiles.push(new Projectile(this.x, this.y, target, finalDamage, pColor));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage, color) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; this.color = color; this.speed = 10;
        }
        draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill(); }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; return true; }
        }
    }

    function handleGameOver() {
        isGameOver = true;
        const overlay = document.getElementById('game-over-overlay');
        document.getElementById('game-over-text').innerText = dict[currentLang].gameOverText + wave;
        
        if (gameMode === 'hard') {
            document.getElementById('hard-death-text').style.display = 'block';
        } else {
            permanentUpgrades.bonusGold += 25;
            permanentUpgrades.bonusLives += 2;
            const towerTypes = ['basic', 'rapid', 'laser', 'sniper', 'heavy'];
            permanentUpgrades.freeTower = towerTypes[Math.floor(Math.random() * towerTypes.length)];
            document.getElementById('hard-death-text').style.display = 'none';
            saveProgress();
        }
        overlay.style.display = 'flex';
        if (gameMode !== 'bug') isPaused = true;
    }

    function restartFromGameOver() {
        document.getElementById('game-over-overlay').style.display = 'none';
        resetGame(false);
    }

    function resetGame(forceClean) {
        isGameOver = false;
        if (gameMode === 'hard' || forceClean) { gold = 150; lives = 20; }
        else { gold = 150 + permanentUpgrades.bonusGold; lives = 20 + permanentUpgrades.bonusLives; }
        wave = 0; enemies = []; towers = []; projectiles = []; enemiesToSpawn = []; isWaveActive = false; spawnTimer = 0;
        selectedTowerType = null; selectedTowerInstance = null;
        
        // CORRECCIÓN VISUAL DE SELECCIÓN FANTASMA
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        
        isPaused = false;
        const btn = document.getElementById('btn-pause');
        btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;
        btn.classList.remove('active-pause');
        document.getElementById('pause-indicator').style.display = 'none';
        
        // ZONA SEGURA PARA LA TORRE GRATIS: X=50, Y=50
        if (gameMode !== 'hard' && !forceClean && permanentUpgrades.freeTower) { 
            towers.push(new Tower(50, 50, permanentUpgrades.freeTower)); 
        }
        updateUI();
    }

    // INTERACCIÓN CON EL CANVAS (COMPLETAMENTE PRECISO)
    canvas.addEventListener('click', (e) => {
        if (isPaused || (isGameOver && gameMode !== 'bug')) return; 
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = 800 / rect.width;
        const scaleY = 600 / rect.height;

        const mx = (e.clientX - rect.left) * scaleX; 
        const my = (e.clientY - rect.top) * scaleY;

        let clickedTower = null;
        for (let t of towers) { if (Math.hypot(t.x - mx, t.y - my) < 20) { clickedTower = t; break; } }
        if (clickedTower) { selectedTowerInstance = clickedTower; updateUI(); return; }

        if (!selectedTowerType) { selectedTowerInstance = null; updateUI(); return; }
        if (isPointOnPath(mx, my)) return; 
        for (let t of towers) { if (Math.hypot(t.x - mx, t.y - my) < 31) return; }

        if(selectedTowerType === 'titan') {
            const titanCount = towers.filter(t => t.type === 'titan').length;
            if(titanCount >= 3) return;
        }

        const def = towerDefinitions[selectedTowerType];
        if (def && gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; 
            
            // Después de construir, NO deseleccionamos la torre para permitir construir rápido
            // Pero actualizamos la UI para descontar el oro
            updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function maxUpgradeSelectedTower() {
        if (isPaused || !selectedTowerInstance) return;
        let upgraded = false;
        while (gold >= selectedTowerInstance.getUpgradeCost()) {
            selectedTowerInstance.upgrade();
            upgraded = true;
        }
        if(upgraded) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) { while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; } }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);
        if (wave % 5 === 0) {
            if (wave >= 100) enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier));
            else enemiesToSpawn.push(new Enemy('boss', hpMultiplier));
            count = Math.floor(count / 2); 
        }
        for (let i = 0; i < count; i++) {
            let r = Math.random(); let type = 'normal';
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha'; else if (r > 0.6) type = 'phantom'; else if (r > 0.4) type = 'mutant'; else if (r > 0.3) type = 'tank'; else if (r > 0.1) type = 'fast';
            } else { if (wave > 2 && r > 0.6) type = 'fast'; if (wave > 3 && r > 0.8) type = 'tank'; }
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; enemies.push(e); staggerDistance += 12; 
        }
    }

    function gameLoop() {
        const currentMap = maps[currentMapIndex];
        ctx.fillStyle = currentMap.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = currentMap.pathColor; ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentMap.points[0].x, currentMap.points[0].y);
        for (let i = 1; i < currentMap.points.length; i++) ctx.lineTo(currentMap.points[i].x, currentMap.points[i].y);
        ctx.stroke();

        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) { enemies.push(enemiesToSpawn.shift()); spawnTimer = 0; }
                else if (enemiesToSpawn.length === 0 && enemies.length === 0) isWaveActive = false; 
            }
            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) { if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1); }
            for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].update(); if (enemies[i].hp <= 0) enemies.splice(i, 1); }
        }
        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();
        requestAnimationFrame(gameLoop);
    }

    updateHUDPositionVisual();
    updateSettingsUI();
    resetGame(false);
    gameLoop();
</script>
