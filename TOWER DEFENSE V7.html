<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Offline & Pausa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            display: flex;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }
        canvas {
            background-color: #4CAF50; 
            border: 2px solid #555;
            cursor: crosshair;
        }
        #ui-panel {
            width: 270px;
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .stats {
            background: #111;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stats h2, .stats h3 {
            margin: 0 0 5px 0;
            font-size: 15px;
        }
        .stats p {
            margin: 2px 0;
        }
        .stats span { font-weight: bold; color: #FFD700; }
        
        .row-btn {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .small-btn {
            flex: 1;
            background-color: #444;
            margin: 0 2px;
            padding: 5px;
            font-size: 12px;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 3px;
        }
        .small-btn.active { background-color: #2196F3; font-weight: bold;}
        .hard-btn.active { background-color: #e53935; }
        
        button {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        button:hover { background-color: #777; }
        button.selected { background-color: #2196F3; border: 2px solid #fff; }
        #upgrade-panel {
            background: #111;
            padding: 10px;
            border-radius: 5px;
            display: none;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .action-btn { font-weight: bold; font-size: 13px; }
        #upgrade-all-btn { background-color: #8E24AA; margin-top: 5px; }
        #upgrade-all-btn:hover { background-color: #AB47BC; }
        #btn-pause { background-color: #FFC107; color: black; font-weight: bold; }
        #btn-pause:hover { background-color: #FFB300; }

        /* PANTALLA DE GAME OVER */
        #game-over-overlay {
            display: none; 
            position: absolute; 
            top: 10px; left: 10px;
            width: 800px;
            height: 600px;
            background: rgba(0, 0, 0, 0.85); 
            z-index: 10; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            border-radius: 4px;
        }
        #game-over-overlay h1 {
            color: #F44336;
            font-size: 50px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px #000;
        }
        #game-over-text {
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #hard-death-text {
            color: #ff9800;
            font-size: 16px;
            margin-bottom: 30px;
            display: none;
        }
        #play-again-btn {
            background-color: #4CAF50;
            font-size: 20px;
            padding: 15px 40px;
            border-radius: 8px;
        }
        #play-again-btn:hover { background-color: #66BB6A; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-over-overlay">
        <h1 id="t-game-over-title">Juego Terminado</h1>
        <p id="game-over-text"></p>
        <p id="hard-death-text">Modo Hard: Sin mejoras permanentes conseguidas.</p>
        <button id="play-again-btn" onclick="restartFromGameOver()"></button>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-panel">
        <div class="row-btn">
            <button id="lang-es" class="small-btn active" onclick="setLanguage('es')">ES</button>
            <button id="lang-en" class="small-btn" onclick="setLanguage('en')">EN</button>
            <button id="lang-ja" class="small-btn" onclick="setLanguage('ja')">日本語</button>
        </div>

        <div class="stats">
            <div class="row-btn" style="margin-bottom: 8px;">
                <button id="btn-pause" onclick="togglePause()">⏸️ Pausa</button>
            </div>
            <h3 id="t-settings">Ajustes (Reinicia)</h3>
            <div class="row-btn">
                <button id="btn-map1" class="small-btn active" onclick="setMap(0)">Mapa 1</button>
                <button id="btn-map2" class="small-btn" onclick="setMap(1)">Mapa 2</button>
            </div>
            <div class="row-btn">
                <button id="btn-normal" class="small-btn active" onclick="setDifficulty(false)">Normal</button>
                <button id="btn-hard" class="small-btn hard-btn" onclick="setDifficulty(true)">Hard</button>
            </div>
        </div>

        <div class="stats">
            <h2><span id="t-wave">Oleada:</span> <span id="wave-display">0</span></h2>
            <p><span id="t-lives">Vidas:</span> <span id="lives-display">20</span> 💖</p>
            <p><span id="t-gold">Oro:</span> <span id="gold-display">150</span> 💰</p>
        </div>

        <div class="stats" id="perm-panel">
            <h3 id="t-perm-title">Mejoras Permanentes</h3>
            <p><span id="t-perm-gold">+ Oro inicial:</span> <span id="perm-gold">0</span></p>
            <p><span id="t-perm-lives">+ Vidas:</span> <span id="perm-lives">0</span></p>
            <p><span id="t-perm-tower">Torre gratis:</span> <span id="perm-tower">-</span></p>
        </div>

        <h3 id="t-build">Construir Torres</h3>
        <button id="btn-basic" class="tower-btn selected" onclick="selectTower('basic')"></button>
        <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')"></button>
        <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')"></button>
        <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')"></button>

        <button id="next-wave-btn" class="action-btn" onclick="startWave()" style="background-color: #4CAF50;"></button>
        <button id="rush-wave-btn" class="action-btn" onclick="rushWave()" style="background-color: #e53935;"></button>
        <button id="upgrade-all-btn" class="action-btn" onclick="upgradeAllTowers()"></button>

        <div id="upgrade-panel">
            <h3 id="t-selected">Torre Seleccionada</h3>
            <p><span id="t-lvl">Nvl:</span> <span id="tower-lvl"></span> | <span id="t-dmg">Daño:</span> <span id="tower-dmg"></span></p>
            <button id="upgrade-btn" onclick="upgradeSelectedTower()" style="background-color: #ff9800; width: 100%; font-weight: bold;"></button>
        </div>
    </div>
</div>

<script>
    const dict = {
        es: {
            wave: "Oleada:", lives: "Vidas:", gold: "Oro:", build: "Construir Torres", settings: "Ajustes (Reinicia)",
            basic: "🟦 Torre Básica ($50)<br><small>Balanceada</small>", rapid: "🟨 Torre Rápida ($75)<br><small>Rápida, daño bajo</small>",
            sniper: "🟪 Francotirador ($100)<br><small>Largo alcance</small>", heavy: "⬛ Torre Pesada ($150)<br><small>Daño masivo</small>",
            startWave: "Iniciar Oleada", rushWave: "¡Todos de golpe!", upgradeAll: "🌟 Mejorar Todas ($)", 
            selected: "Torre Sel.", lvl: "Nvl:", dmg: "Daño:", btnUpgrade: "Mejorar ($", 
            gameOverTitle: "Juego Terminado", gameOverText: "Llegaste a la oleada: ", playAgain: "Volver a jugar",
            permTitle: "Mejoras Permanentes", permGold: "+ Oro inicial:", permLives: "+ Vidas:", permTower: "Torre gratis:",
            hardDeath: "Modo Hard: Sin mejoras permanentes.", pause: "⏸️ Pausa", resume: "▶️ Reanudar", pausedText: "PAUSA"
        },
        en: {
            wave: "Wave:", lives: "Lives:", gold: "Gold:", build: "Build Towers", settings: "Settings (Resets)",
            basic: "🟦 Basic Tower ($50)<br><small>Balanced</small>", rapid: "🟨 Rapid Tower ($75)<br><small>Fast attack</small>",
            sniper: "🟪 Sniper Tower ($100)<br><small>Long range</small>", heavy: "⬛ Heavy Tower ($150)<br><small>High damage</small>",
            startWave: "Start Wave", rushWave: "Send all!", upgradeAll: "🌟 Upgrade All", 
            selected: "Selected", lvl: "Lvl:", dmg: "Dmg:", btnUpgrade: "Upgrade ($", 
            gameOverTitle: "Game Over", gameOverText: "You reached Wave: ", playAgain: "Play Again",
            permTitle: "Permanent Upgrades", permGold: "+ Start Gold:", permLives: "+ Lives:", permTower: "Free Tower:",
            hardDeath: "Hard Mode: No permanent upgrades.", pause: "⏸️ Pause", resume: "▶️ Resume", pausedText: "PAUSED"
        },
        ja: {
            wave: "ウェーブ:", lives: "ライフ:", gold: "お金:", build: "タワー建設", settings: "設定 (リセット)",
            basic: "🟦 基本タワー ($50)", rapid: "🟨 速射タワー ($75)", sniper: "🟪 スナイパー ($100)", heavy: "⬛ 重タワー ($150)",
            startWave: "ウェーブ開始", rushWave: "全敵を呼ぶ！", upgradeAll: "🌟 全て強化", 
            selected: "選択中", lvl: "Lv:", dmg: "ダメ:", btnUpgrade: "強化 ($", 
            gameOverTitle: "ゲームオーバー", gameOverText: "到達ウェーブ: ", playAgain: "もう一度",
            permTitle: "永久アップグレード", permGold: "+ 初期お金:", permLives: "+ ライフ:", permTower: "無料タワー:",
            hardDeath: "ハードモード: 永久アップグレードなし。", pause: "⏸️ 一時停止", resume: "▶️ 再開", pausedText: "一時停止中"
        }
    };

    let currentLang = 'es';
    let isHardMode = false;
    let currentMapIndex = 0;
    let isPaused = false;

    // --- Sistema de Guardado Local (Offline) ---
    let permanentUpgrades = { bonusGold: 0, bonusLives: 0, freeTower: null };

    function loadProgress() {
        const saved = localStorage.getItem('td_permanentUpgrades');
        if (saved) {
            permanentUpgrades = JSON.parse(saved);
        }
    }

    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades', JSON.stringify(permanentUpgrades));
    }

    // Inicializar guardado
    loadProgress();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gold = 150, lives = 20, wave = 0;
    let enemies = [], towers = [], projectiles = [], enemiesToSpawn = [];
    let isWaveActive = false, spawnTimer = 0;
    let selectedTowerType = 'basic', selectedTowerInstance = null;

    const maps = [
        [ {x: -20, y: 120}, {x: 650, y: 120}, {x: 650, y: 350}, {x: 150, y: 350}, {x: 150, y: 520}, {x: 820, y: 520} ],
        [ {x: 200, y: -20}, {x: 200, y: 400}, {x: 600, y: 400}, {x: 600, y: 150}, {x: 820, y: 150} ]
    ];

    const towerDefinitions = {
        basic:  { cost: 50,  range: 120, damage: 20,  cooldown: 60, color: '#2196F3' }, 
        rapid:  { cost: 75,  range: 90,  damage: 8,   cooldown: 15, color: '#FFEB3B' }, 
        sniper: { cost: 100, range: 300, damage: 60,  cooldown: 120, color: '#9C27B0' },
        heavy:  { cost: 150, range: 140, damage: 120, cooldown: 180, color: '#212121' }  
    };

    const enemyDefinitions = {
        normal: { hp: 50,   speed: 1.2, color: '#F44336', radius: 12, reward: 10 },
        fast:   { hp: 30,   speed: 2.5, color: '#FF9800', radius: 10, reward: 15 },
        tank:   { hp: 150,  speed: 0.7, color: '#8B0000', radius: 16, reward: 25 },
        boss:   { hp: 1000, speed: 0.5, color: '#000000', radius: 25, reward: 150 },
        mutant:  { hp: 1500, speed: 1.5, color: '#00BCD4', radius: 14, reward: 50 },
        phantom: { hp: 800,  speed: 3.0, color: '#E0E0E0', radius: 10, reward: 40 },
        mecha:   { hp: 3500, speed: 0.6, color: '#607D8B', radius: 18, reward: 60 },
        omega_boss: { hp: 20000, speed: 0.4, color: '#4A148C', radius: 35, reward: 500 }
    };

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('#lang-es, #lang-en, #lang-ja').forEach(b => b.classList.remove('active'));
        document.getElementById('lang-' + lang).classList.add('active');
        
        // Actualizar botón de pausa si estamos en pausa
        const pauseBtn = document.getElementById('btn-pause');
        pauseBtn.innerText = isPaused ? dict[currentLang].resume : dict[currentLang].pause;
        
        updateUI();
    }

    function togglePause() {
        if (lives <= 0) return; // No pausar si estás muerto
        isPaused = !isPaused;
        const btn = document.getElementById('btn-pause');
        if (isPaused) {
            btn.innerText = dict[currentLang].resume;
            btn.style.backgroundColor = '#4CAF50';
            btn.style.color = 'white';
        } else {
            btn.innerText = dict[currentLang].pause;
            btn.style.backgroundColor = '#FFC107';
            btn.style.color = 'black';
        }
    }

    function setMap(index) {
        currentMapIndex = index;
        document.getElementById('btn-map1').classList.remove('active');
        document.getElementById('btn-map2').classList.remove('active');
        document.getElementById(index === 0 ? 'btn-map1' : 'btn-map2').classList.add('active');
        resetGame(true);
    }

    function setDifficulty(hard) {
        isHardMode = hard;
        document.getElementById('btn-normal').classList.remove('active');
        document.getElementById('btn-hard').classList.remove('active');
        document.getElementById(hard ? 'btn-hard' : 'btn-normal').classList.add('active');
        
        document.getElementById('perm-panel').style.display = hard ? 'none' : 'block';
        resetGame(true);
    }

    function updateUI() {
        const text = dict[currentLang];
        
        document.getElementById('t-settings').innerText = text.settings;
        document.getElementById('t-wave').innerText = text.wave;
        document.getElementById('t-lives').innerText = text.lives;
        document.getElementById('t-gold').innerText = text.gold;
        document.getElementById('t-build').innerText = text.build;
        document.getElementById('btn-basic').innerHTML = text.basic;
        document.getElementById('btn-rapid').innerHTML = text.rapid;
        document.getElementById('btn-sniper').innerHTML = text.sniper;
        document.getElementById('btn-heavy').innerHTML = text.heavy;
        document.getElementById('next-wave-btn').innerText = text.startWave;
        document.getElementById('rush-wave-btn').innerText = text.rushWave;
        document.getElementById('upgrade-all-btn').innerText = text.upgradeAll;
        document.getElementById('t-selected').innerText = text.selected;
        document.getElementById('t-lvl').innerText = text.lvl;
        document.getElementById('t-dmg').innerText = text.dmg;
        
        document.getElementById('t-perm-title').innerText = text.permTitle;
        document.getElementById('t-perm-gold').innerText = text.permGold;
        document.getElementById('t-perm-lives').innerText = text.permLives;
        document.getElementById('t-perm-tower').innerText = text.permTower;

        document.getElementById('t-game-over-title').innerText = text.gameOverTitle;
        document.getElementById('play-again-btn').innerText = text.playAgain;
        document.getElementById('hard-death-text').innerText = text.hardDeath;

        document.getElementById('gold-display').innerText = gold;
        document.getElementById('lives-display').innerText = lives;
        document.getElementById('wave-display').innerText = wave;
        
        document.getElementById('perm-gold').innerText = permanentUpgrades.bonusGold;
        document.getElementById('perm-lives').innerText = permanentUpgrades.bonusLives;
        
        const towerNames = { 'basic': '🟦', 'rapid': '🟨', 'sniper': '🟪', 'heavy': '⬛' };
        document.getElementById('perm-tower').innerText = permanentUpgrades.freeTower ? towerNames[permanentUpgrades.freeTower] : "-";
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            document.getElementById('tower-dmg').innerText = Math.floor(selectedTowerInstance.damage);
            document.getElementById('upgrade-btn').innerText = text.btnUpgrade + selectedTowerInstance.getUpgradeCost() + ")";
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function selectTower(type) {
        selectedTowerType = type;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('btn-' + type).classList.add('selected');
        selectedTowerInstance = null; 
        updateUI();
    }

    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.color = this.def.color;
            this.radius = this.def.radius;
            this.reward = this.def.reward;
            this.waypointIndex = 0;
            
            const currentPath = maps[currentMapIndex];
            this.x = currentPath[0].x;
            this.y = currentPath[0].y;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen';
            ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }

        update() {
            const currentPath = maps[currentMapIndex];
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;

            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.x = target.x;
                this.y = target.y;
                this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--;
                    this.hp = 0; 
                    updateUI();
                    if (lives <= 0) handleGameOver();
                }
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; this.color = this.def.color;
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost; this.level++;
                this.damage *= 1.3; this.range *= 1.05; 
                return true; 
            } return false;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            ctx.fillStyle = 'white'; ctx.font = '12px Arial'; ctx.textAlign = 'center';
            ctx.fillText("L" + this.level, this.x, this.y + 4);
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    projectiles.push(new Projectile(this.x, this.y, target, this.damage));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; this.speed = 8;
        }
        draw() {
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    function handleGameOver() {
        const overlay = document.getElementById('game-over-overlay');
        document.getElementById('game-over-text').innerText = dict[currentLang].gameOverText + wave;
        
        if (!isHardMode) {
            permanentUpgrades.bonusGold += 25;
            permanentUpgrades.bonusLives += 2;
            const towerTypes = ['basic', 'rapid', 'sniper', 'heavy'];
            permanentUpgrades.freeTower = towerTypes[Math.floor(Math.random() * towerTypes.length)];
            document.getElementById('hard-death-text').style.display = 'none';
            
            // Guardar progreso
            saveProgress();
        } else {
            document.getElementById('hard-death-text').style.display = 'block';
        }
        
        overlay.style.display = 'flex';
    }

    function restartFromGameOver() {
        document.getElementById('game-over-overlay').style.display = 'none';
        resetGame(false);
    }

    function resetGame(forceClean) {
        if (isHardMode || forceClean) {
            gold = 150; lives = 20;
        } else {
            gold = 150 + permanentUpgrades.bonusGold;
            lives = 20 + permanentUpgrades.bonusLives;
        }
        
        wave = 0; enemies = []; towers = []; projectiles = [];
        enemiesToSpawn = []; isWaveActive = false; selectedTowerInstance = null;
        isPaused = false;
        
        const btn = document.getElementById('btn-pause');
        btn.innerText = dict[currentLang].pause;
        btn.style.backgroundColor = '#FFC107';
        btn.style.color = 'black';

        if (!isHardMode && !forceClean && permanentUpgrades.freeTower) {
            towers.push(new Tower(200, 200, permanentUpgrades.freeTower));
        }
        updateUI();
    }

    canvas.addEventListener('click', (e) => {
        if (lives <= 0 || isPaused) return; // Deshabilitado en pausa o muerto
        
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left; const my = e.clientY - rect.top;

        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) {
                selectedTowerInstance = t; updateUI(); return;
            }
        }
        const def = towerDefinitions[selectedTowerType];
        if (gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; selectedTowerInstance = towers[towers.length - 1]; updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) {
            while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; }
        }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);

        if (wave % 5 === 0) {
            if (wave >= 100) {
                enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier));
            } else {
                enemiesToSpawn.push(new Enemy('boss', hpMultiplier));
            }
            count = Math.floor(count / 2); 
        }

        for (let i = 0; i < count; i++) {
            let r = Math.random();
            let type = 'normal';
            
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha';
                else if (r > 0.6) type = 'phantom';
                else if (r > 0.4) type = 'mutant';
                else if (r > 0.3) type = 'tank';
                else if (r > 0.1) type = 'fast';
            } else {
                if (wave > 2 && r > 0.6) type = 'fast';
                if (wave > 3 && r > 0.8) type = 'tank';
            }
            
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; 
            enemies.push(e); staggerDistance += 12; 
        }
    }

    function gameLoop() {
        // 1. Dibujar el mapa base
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const currentPath = maps[currentMapIndex];
        ctx.strokeStyle = '#e0c097'; ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentPath[0].x, currentPath[0].y);
        for (let i = 1; i < currentPath.length; i++) ctx.lineTo(currentPath[i].x, currentPath[i].y);
        ctx.stroke();

        // 2. Lógica del juego (SOLO si no está pausado)
        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) {
                    enemies.push(enemiesToSpawn.shift()); spawnTimer = 0;
                } else if (enemiesToSpawn.length === 0 && enemies.length === 0) {
                    isWaveActive = false; 
                }
            }

            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1);
            }
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].hp <= 0) enemies.splice(i, 1);
            }
        }

        // 3. Dibujar entidades
        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();

        // 4. Dibujar overlay de Pausa si aplica
        if (isPaused) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(dict[currentLang].pausedText, canvas.width / 2, canvas.height / 2);
        }

        requestAnimationFrame(gameLoop);
    }

    // Arrancar juego al cargar
    resetGame(false);
    updateUI();
    gameLoop();
</script>
