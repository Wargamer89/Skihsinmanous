<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Mapa Ampliado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            display: flex;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            background-color: #4CAF50; /* Fondo de pasto */
            border: 2px solid #555;
            cursor: crosshair;
        }
        #ui-panel {
            width: 250px;
            margin-left: 20px;
            display: flex;
            flex-direction: column;
        }
        .stats {
            background: #111;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .stats span { font-weight: bold; color: #FFD700; }
        button {
            background-color: #555;
            color: white;
            border: none;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #777; }
        button.selected { background-color: #2196F3; border: 2px solid #fff; }
        #upgrade-panel {
            margin-top: auto;
            background: #111;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        #upgrade-btn { background-color: #ff9800; width: 100%; font-weight: bold;}
        #upgrade-btn:hover { background-color: #ffb74d; }
        .action-btn { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-panel">
        <div class="stats">
            <h2>Oleada: <span id="wave-display">0</span></h2>
            <p>Vidas: <span id="lives-display">20</span> 💖</p>
            <p>Oro: <span id="gold-display">150</span> 💰</p>
        </div>

        <h3>Construir Torres</h3>
        <button id="btn-basic" class="tower-btn selected" onclick="selectTower('basic')">
            🟦 Torre Básica ($50)<br><small>Estadísticas balanceadas</small>
        </button>
        <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')">
            🟨 Torre Rápida ($75)<br><small>Ataque rápido, daño bajo</small>
        </button>
        <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')">
            🟪 Torre Francotirador ($100)<br><small>Largo alcance, ataque lento</small>
        </button>
        <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')">
            ⬛ Torre Pesada ($150)<br><small>Daño masivo, ataque muy lento</small>
        </button>

        <button id="next-wave-btn" class="action-btn" onclick="startWave()" style="background-color: #4CAF50; margin-top: 15px;">Iniciar Oleada</button>
        <button id="rush-wave-btn" class="action-btn" onclick="rushWave()" style="background-color: #e53935;">¡Que vengan todos de golpe!</button>

        <div id="upgrade-panel">
            <h3>Torre Seleccionada</h3>
            <p>Nvl: <span id="tower-lvl"></span> | Daño: <span id="tower-dmg"></span></p>
            <button id="upgrade-btn" onclick="upgradeSelectedTower()">Mejorar ($<span id="upgrade-cost"></span>)</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Variables del Juego
    let gold = 150;
    let lives = 20;
    let wave = 0;
    let enemies = [];
    let towers = [];
    let projectiles = [];
    let selectedTowerType = 'basic';
    let selectedTowerInstance = null;
    let isWaveActive = false;
    let enemiesToSpawn = [];
    let spawnTimer = 0;

    // Ruta de los enemigos ajustada para el mapa más ancho y alto
    const path = [
        {x: -20, y: 120}, {x: 650, y: 120}, 
        {x: 650, y: 350}, {x: 150, y: 350}, 
        {x: 150, y: 520}, {x: 820, y: 520}
    ];

    // Definiciones de torres y enemigos
    const towerDefinitions = {
        basic:  { cost: 50,  range: 120, damage: 20,  cooldown: 60, color: '#2196F3' }, 
        rapid:  { cost: 75,  range: 90,  damage: 8,   cooldown: 15, color: '#FFEB3B' }, 
        sniper: { cost: 100, range: 300, damage: 60,  cooldown: 120, color: '#9C27B0' },
        heavy:  { cost: 150, range: 140, damage: 120, cooldown: 180, color: '#212121' }  
    };

    const enemyDefinitions = {
        normal: { hp: 50,   speed: 1.2, color: '#F44336', radius: 12, reward: 10 },
        fast:   { hp: 30,   speed: 2.5, color: '#FF9800', radius: 10, reward: 15 },
        tank:   { hp: 150,  speed: 0.7, color: '#8B0000', radius: 16, reward: 25 },
        boss:   { hp: 1000, speed: 0.5, color: '#000000', radius: 25, reward: 150 }
    };

    // Actualizar la interfaz
    function updateUI() {
        document.getElementById('gold-display').innerText = gold;
        document.getElementById('lives-display').innerText = lives;
        document.getElementById('wave-display').innerText = wave;
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            document.getElementById('tower-dmg').innerText = Math.floor(selectedTowerInstance.damage);
            document.getElementById('upgrade-cost').innerText = selectedTowerInstance.getUpgradeCost();
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function selectTower(type) {
        selectedTowerType = type;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        document.getElementById('btn-' + type).classList.add('selected');
        selectedTowerInstance = null; 
        updateUI();
    }

    // Clases
    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.color = this.def.color;
            this.radius = this.def.radius;
            this.reward = this.def.reward;
            this.waypointIndex = 0;
            this.x = path[0].x;
            this.y = path[0].y;
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();

            // Barra de salud
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen';
            ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }

        update() {
            const target = path[this.waypointIndex + 1];
            if (!target) return;

            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.x = target.x;
                this.y = target.y;
                this.waypointIndex++;
                if (this.waypointIndex >= path.length - 1) {
                    lives--;
                    this.hp = 0; 
                    updateUI();
                    if (lives <= 0) alert(`¡Fin del juego! Llegaste a la oleada ${wave}`);
                }
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range;
            this.damage = this.def.damage;
            this.cooldown = this.def.cooldown;
            this.color = this.def.color;
            this.timer = 0;
            this.level = 1;
            this.width = 30;
        }

        getUpgradeCost() {
            return Math.floor(this.def.cost * 0.8 * this.level);
        }

        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost;
                this.level++;
                this.damage *= 1.3; 
                this.range *= 1.05; 
                updateUI();
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            
            // Indicador de Nivel
            ctx.fillStyle = 'white';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("L" + this.level, this.x, this.y + 4);

            // Anillo de selección
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        update() {
            if (this.timer > 0) this.timer--;

            if (this.timer === 0) {
                let target = null;
                let minDist = this.range;

                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) {
                        minDist = dist;
                        target = e;
                    }
                }

                if (target) {
                    projectiles.push(new Projectile(this.x, this.y, target, this.damage));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage) {
            this.x = x;
            this.y = y;
            this.target = target;
            this.damage = damage;
            this.speed = 8;
        }

        draw() {
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            const dx = this.target.x - this.x;
            const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) {
                    gold += this.target.reward;
                    updateUI();
                }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    // Interacción del Mouse
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;

        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) {
                selectedTowerInstance = t;
                updateUI();
                return;
            }
        }

        const def = towerDefinitions[selectedTowerType];
        if (gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost;
            selectedTowerInstance = towers[towers.length - 1];
            updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (selectedTowerInstance) {
            selectedTowerInstance.upgrade();
        }
    }

    // Lógica de Oleadas Normal
    function startWave() {
        wave++;
        isWaveActive = true;
        
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);

        if (wave % 5 === 0) {
            enemiesToSpawn.push(new Enemy('boss', hpMultiplier));
            count = Math.floor(count / 2); 
        }

        for (let i = 0; i < count; i++) {
            let r = Math.random();
            let type = 'normal';
            if (wave > 2 && r > 0.6) type = 'fast';
            if (wave > 3 && r > 0.8) type = 'tank';
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }

        updateUI();
    }

    // NUEVA FUNCIÓN: Enviar a todos los de la cola de inmediato
    function rushWave() {
        // Si no hay enemigos en cola, iniciamos una nueva oleada forzosamente
        if (enemiesToSpawn.length === 0) {
            startWave();
        }
        
        // Vaciamos la cola entera en el mapa
        let staggerDistance = 0; // Para que no aparezcan exactamente en el mismo pixel
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift();
            e.x -= staggerDistance; 
            enemies.push(e);
            staggerDistance += 12; // Espacio entre enemigos amontonados
        }
    }

    // Ciclo Principal
    function gameLoop() {
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar Camino
        ctx.strokeStyle = '#e0c097'; 
        ctx.lineWidth = 45; // Camino un poco más grueso para el mapa grande
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(path[0].x, path[0].y);
        for (let i = 1; i < path.length; i++) {
            ctx.lineTo(path[i].x, path[i].y);
        }
        ctx.stroke();

        // Generar Enemigos con Timer Normal
        if (isWaveActive) {
            spawnTimer++;
            if (spawnTimer > 60 && enemiesToSpawn.length > 0) {
                enemies.push(enemiesToSpawn.shift());
                spawnTimer = 0;
            } else if (enemiesToSpawn.length === 0 && enemies.length === 0) {
                isWaveActive = false; 
            }
        }

        for (let t of towers) {
            t.update();
            t.draw();
        }

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.draw();
            if (p.target.hp <= 0 || !p.update()) {
                projectiles.splice(i, 1);
            }
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.draw();
            e.update();
            if (e.hp <= 0) {
                enemies.splice(i, 1);
            }
        }

        if (lives > 0) {
            requestAnimationFrame(gameLoop);
        }
    }

    updateUI();
    gameLoop();
</script>

</body>
</html>
