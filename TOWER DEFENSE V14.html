<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense - Classic UI & Max Upgrade</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #222;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #game-container {
            display: flex;
            background-color: #333;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            position: relative; 
        }
        canvas {
            border: 2px solid #555;
            cursor: crosshair;
            background-color: #4CAF50;
        }
        
        #ui-panel {
            width: 280px;
            margin-left: 20px;
            display: flex;
            flex-direction: column;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .stats {
            background: #111; padding: 8px; border-radius: 5px; margin-bottom: 8px; font-size: 14px;
        }
        .stats h2, .stats h3 { margin: 0 0 5px 0; font-size: 15px; }
        .stats p { margin: 2px 0; }
        .stats span { font-weight: bold; color: #FFD700; }
        
        .row-btn { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 5px; }
        .small-btn {
            flex: 1; background-color: #444; margin: 0; padding: 5px; font-size: 12px;
            border: none; color: white; cursor: pointer; border-radius: 3px;
        }
        .small-btn.active { background-color: #2196F3; font-weight: bold;}
        .hard-btn.active { background-color: #e53935; }
        .bug-btn.active { background-color: #9C27B0; }
        
        button.tower-btn, .action-btn {
            background-color: #555; color: white; border: none; padding: 8px;
            margin-bottom: 6px; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 13px; width: 100%;
        }
        button.tower-btn { text-align: left; }
        button.tower-btn:hover, .action-btn:hover { background-color: #777; }
        button.tower-btn.selected { background-color: #2196F3; border: 2px solid #fff; }
        
        #upgrade-panel {
            background: #2a1b0a; border: 2px solid #ff9800; display: none;
        }
        .action-btn { font-weight: bold; font-size: 13px; text-align: center; }
        #upgrade-all-btn { background-color: #8E24AA; margin-top: 5px; }
        #upgrade-all-btn:hover { background-color: #AB47BC; }

        /* PANTALLA DE GAME OVER Y MODALES */
        .modal-overlay {
            display: none; position: absolute; top: 10px; left: 10px;
            width: 800px; height: 600px; background: rgba(0, 0, 0, 0.85); 
            z-index: 10; flex-direction: column; justify-content: center; align-items: center; border-radius: 4px;
        }
        
        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 10px; border: 2px solid #555;
            width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .modal-content h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px; }
        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; font-size: 14px;}
        .toggle-btn { background: #444; color: white; border: 1px solid #666; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: #FF9800; border-color: #fff; color: #000; }
        .close-modal-btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%; }

        #game-over-overlay h1 { color: #F44336; font-size: 50px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; }
        #game-over-text { font-size: 24px; margin-bottom: 10px; font-weight: bold; }
        #hard-death-text { color: #ff9800; font-size: 16px; margin-bottom: 30px; display: none; }
        #play-again-btn {
            background-color: #4CAF50; color: white; border: none; cursor: pointer;
            font-size: 20px; padding: 15px 40px; border-radius: 8px; font-weight: bold;
        }
        #play-again-btn:hover { background-color: #66BB6A; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-over-overlay" class="modal-overlay">
        <h1 id="t-game-over-title">Juego Terminado</h1>
        <p id="game-over-text"></p>
        <p id="hard-death-text">Modo Hard: Sin mejoras permanentes.</p>
        <button id="play-again-btn" onclick="restartFromGameOver()"></button>
    </div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="t-settings-title">Configuración</h2>
            
            <div class="setting-group">
                <label id="t-lang">🌐 Idioma / Language</label>
                <div class="row-btn">
                    <button id="lang-es" class="small-btn active" onclick="setLanguage('es')">ES</button>
                    <button id="lang-en" class="small-btn" onclick="setLanguage('en')">EN</button>
                    <button id="lang-ja" class="small-btn" onclick="setLanguage('ja')">JA</button>
                    <button id="lang-de" class="small-btn" onclick="setLanguage('de')">DE</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-map">Mapa (Reinicia partida)</label>
                <div class="row-btn">
                    <button id="btn-map1" class="small-btn active" onclick="setMap(0)">Mapa 1</button>
                    <button id="btn-map2" class="small-btn" onclick="setMap(1)">Mapa 2</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-diff">Dificultad (Reinicia partida)</label>
                <div class="row-btn">
                    <button id="btn-normal" class="small-btn active" onclick="setDifficulty('normal')">Normal</button>
                    <button id="btn-hard" class="small-btn hard-btn" onclick="setDifficulty('hard')">Hard</button>
                    <button id="btn-bug" class="small-btn bug-btn" onclick="setDifficulty('bug')">Bug Mode</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-accessibility">Accesibilidad</label>
                <button id="btn-colorblind" class="toggle-btn" onclick="toggleColorblind()">👁️ Modo Daltónico: OFF</button>
            </div>

            <button class="close-modal-btn" onclick="closeSettings()" id="t-close">Cerrar</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <div id="ui-panel">
        
        <div id="upgrade-panel" class="stats">
            <h3 id="t-selected" style="margin: 0 0 5px 0;">Torre Seleccionada</h3>
            <p style="margin:5px 0;"><span id="t-lvl">Nvl:</span> <span id="tower-lvl"></span> | <span id="t-dmg">Daño:</span> <span id="tower-dmg"></span></p>
            <button id="upgrade-btn" class="action-btn" onclick="upgradeSelectedTower()" style="background-color: #ff9800; margin-bottom: 5px;"></button>
            <button id="upgrade-max-btn" class="action-btn" onclick="maxUpgradeSelectedTower()" style="background-color: #D32F2F; margin-bottom: 0;"></button>
        </div>

        <div class="row-btn" style="margin-bottom: 8px;">
            <button id="btn-pause" onclick="togglePause()" style="background-color: #FFC107; color: black; font-weight: bold; flex: 1; padding: 10px; border:none; border-radius: 5px; cursor: pointer;">⏸️ Pausa</button>
            <button id="btn-settings" onclick="openSettings()" style="background-color: #607D8B; color: white; font-weight: bold; flex: 1; padding: 10px; border:none; border-radius: 5px; cursor: pointer;">⚙️ Ajustes</button>
        </div>

        <div class="stats">
            <h2><span id="t-wave">Oleada:</span> <span id="wave-display">0</span></h2>
            <p><span id="t-lives">Vidas:</span> <span id="lives-display">20</span> 💖</p>
            <p><span id="t-gold">Oro:</span> <span id="gold-display">150</span> 💰</p>
        </div>

        <div class="stats" id="perm-panel">
            <h3 id="t-perm-title">Mejoras Permanentes</h3>
            <p><span id="t-perm-gold">+ Oro inicial:</span> <span id="perm-gold">0</span></p>
            <p><span id="t-perm-lives">+ Vidas:</span> <span id="perm-lives">0</span></p>
            <p><span id="t-perm-tower">Torre gratis:</span> <span id="perm-tower">-</span></p>
        </div>

        <h3 id="t-build" style="margin: 5px 0; font-size: 15px;">Construir Torres</h3>
        <button id="btn-basic" class="tower-btn selected" onclick="selectTower('basic')"></button>
        <button id="btn-laser" class="tower-btn" onclick="selectTower('laser')"></button> 
        <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')"></button>
        <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')"></button>
        <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')"></button>

        <div style="margin-top: auto;">
            <button id="next-wave-btn" class="action-btn" onclick="startWave()" style="background-color: #4CAF50;"></button>
            <button id="rush-wave-btn" class="action-btn" onclick="rushWave()" style="background-color: #e53935;"></button>
            <button id="upgrade-all-btn" class="action-btn" onclick="upgradeAllTowers()"></button>
        </div>
    </div>
</div>

<script>
    const dict = {
        es: {
            wave: "Oleada:", lives: "Vidas:", gold: "Oro:", build: "Construir Torres", settings: "Ajustes",
            basic: "🟦 Básica ($50)<br><small>Balanceada</small>", 
            laser: "🟢 Láser ($125)<br><small>Dispara todo el tiempo</small>",
            rapid: "🟨 Rápida ($75)<br><small>Velocidad media</small>", 
            sniper: "🟪 Francotirador ($100)<br><small>Largo alcance</small>", 
            heavy: "⬛ Pesada ($150)<br><small>Daño masivo</small>",
            startWave: "Iniciar Oleada", rushWave: "¡Todos de golpe!", upgradeAll: "🌟 Mejorar Todas ($)", 
            selected: "Torre Seleccionada", lvl: "Nvl:", dmg: "Daño:", btnUpgrade: "Mejorar (", btnMaxUpgrade: "💥 Mejorar al Máx",
            gameOverTitle: "Juego Terminado", gameOverText: "Llegaste a la oleada: ", playAgain: "Volver a jugar",
            permTitle: "Mejoras Permanentes", permGold: "+ Oro inicial:", permLives: "+ Vidas:", permTower: "Torre gratis:",
            hardDeath: "Modo Hard: Sin mejoras permanentes.", pause: "⏸️ Pausa", resume: "▶️ Reanudar", pausedText: "PAUSA",
            map1: "Mapa 1", map2: "Mapa 2", normal: "Normal", hard: "Hard", bugMode: "Bug Mode", accessibility: "Accesibilidad",
            cbOn: "👁️ Modo Daltónico: ON", cbOff: "👁️ Modo Daltónico: OFF", close: "Cerrar", lang: "🌐 Idioma / Language",
            map: "Mapa (Reinicia)", diff: "Dificultad (Reinicia)"
        },
        en: {
            wave: "Wave:", lives: "Lives:", gold: "Gold:", build: "Build Towers", settings: "Settings",
            basic: "🟦 Basic ($50)<br><small>Balanced</small>",

            startWave: "Start Wave", rushWave: "Send all!", upgradeAll: "🌟 Upgrade All", 
            selected: "Selected Tower", lvl: "Lvl:", dmg: "Dmg:", btnUpgrade: "Upgrade (", btnMaxUpgrade: "💥 Max Upgrade",
            gameOverTitle: "Game Over", gameOverText: "You reached Wave: ", playAgain: "Play Again",
            permTitle: "Permanent Upgrades", permGold: "+ Start Gold:", permLives: "+ Lives:", permTower: "Free Tower:",
            hardDeath: "Hard Mode: No permanent upgrades.", pause: "⏸️ Pause", resume: "▶️ Resume", pausedText: "PAUSED",
            map1: "Map 1", map2: "Map 2", normal: "Normal", hard: "Hard", bugMode: "Bug Mode", accessibility: "Accessibility",
            cbOn: "👁️ Colorblind: ON", cbOff: "👁️ Colorblind: OFF", close: "Close", lang: "🌐 Language",
            map: "Map (Resets)", diff: "Difficulty (Resets)"
        },
        ja: {
            wave: "ウェーブ:", lives: "ライフ:", gold: "お金:", build: "タワー建設", settings: "設定",
            basic: "🟦 基本 ($50)", laser: "🟢 レーザー ($125)", rapid: "🟨 速射 ($75)", 
            sniper: "🟪 スナイパー ($100)", heavy: "⬛ 重タワー ($150)",
            startWave: "ウェーブ開始", rushWave: "全敵を呼ぶ！", upgradeAll: "🌟 全て強化", 
            selected: "選択中", lvl: "Lv:", dmg: "ダメ:", btnUpgrade: "強化 (", btnMaxUpgrade: "💥 最大強化",
            gameOverTitle: "ゲームオーバー", gameOverText: "到達ウェーブ: ", playAgain: "もう一度",
            permTitle: "永久アップグレード", permGold: "+ 初期お金:", permLives: "+ ライフ:", permTower: "無料タワー:",
            hardDeath: "ハードモード: 永久アップグレードなし。", pause: "⏸️ 一時停止", resume: "▶️ 再開", pausedText: "一時停止中",
            map1: "マップ 1", map2: "マップ 2", normal: "ノーマル", hard: "ハード", bugMode: "バグモード", accessibility: "アクセシビリティ",
            cbOn: "👁️ 色覚サポート: ON", cbOff: "👁️ 色覚サポート: OFF", close: "閉じる", lang: "🌐 言語",
            map: "マップ (リセット)", diff: "難易度 (リセット)"
        },
        de: {
            wave: "Welle:", lives: "Leben:", gold: "Gold:", build: "Türme bauen", settings: "Einstellungen",
            basic: "🟦 Basis ($50)<br><small>Ausgewogen</small>", 
            laser: "🟢 Laser ($125)<br><small>Schießt immer</small>",
            rapid: "🟨 Schnell ($75)<br><small>Schnell</small>", 
            sniper: "🟪 Sniper ($100)<br><small>Hohe Reichweite</small>", 
            heavy: "⬛ Schwer ($150)<br><small>Viel Schaden</small>",
            startWave: "Welle starten", rushWave: "Alle senden!", upgradeAll: "🌟 Alle verbessern", 
            selected: "Ausgewählt", lvl: "Lvl:", dmg: "Dmg:", btnUpgrade: "Verbessern (", btnMaxUpgrade: "💥 Max. Upgrade",
            gameOverTitle: "Spiel vorbei", gameOverText: "Erreichte Welle: ", playAgain: "Nochmal spielen",
            permTitle: "Permanente Upgrades", permGold: "+ Startgold:", permLives: "+ Leben:", permTower: "Gratisturm:",
            hardDeath: "Hard-Modus: Keine Upgrades.", pause: "⏸️ Pause", resume: "▶️ Weiter", pausedText: "PAUSIERT",
            map1: "Karte 1", map2: "Karte 2", normal: "Normal", hard: "Hard", bugMode: "Bug Mode", accessibility: "Barrierefreiheit",
            cbOn: "👁️ Farbenblind: AN", cbOff: "👁️ Farbenblind: AUS", close: "Schließen", lang: "🌐 Sprache",
            map: "Karte (Reset)", diff: "Schwierigkeit (Reset)"
        }
    };

    let currentLang = 'es';
    let gameMode = 'normal'; 
    let currentMapIndex = 0;
    let isPaused = false;
    let isGameOver = false;
    let isColorblindMode = false;

    let permanentUpgrades = { bonusGold: 0, bonusLives: 0, freeTower: null };

    function loadProgress() {
        const saved = localStorage.getItem('td_permanentUpgrades_v7');
        if (saved) permanentUpgrades = JSON.parse(saved);
        const cbSaved = localStorage.getItem('td_colorblind');
        if (cbSaved) isColorblindMode = cbSaved === 'true';
    }
    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades_v7', JSON.stringify(permanentUpgrades));
        localStorage.setItem('td_colorblind', isColorblindMode);
    }
    loadProgress();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gold = 150, lives = 20, wave = 0;
    let enemies = [], towers = [], projectiles = [], enemiesToSpawn = [];
    let isWaveActive = false, spawnTimer = 0;
    let selectedTowerType = null, selectedTowerInstance = null;

    const maps = [
        { 
            bg: '#4CAF50', pathColor: '#e0c097', 
            points: [ {x: -20, y: 120}, {x: 650, y: 120}, {x: 650, y: 350}, {x: 150, y: 350}, {x: 150, y: 520}, {x: 820, y: 520} ] 
        },
        { 
            bg: '#F4A460', pathColor: '#DEB887', 
            points: [ {x: 200, y: -20}, {x: 200, y: 400}, {x: 600, y: 400}, {x: 600, y: 150}, {x: 820, y: 150} ] 
        }
    ];

    const towerDefinitions = {
        basic:  { cost: 50,  range: 120, damage: 20,  cooldown: 60, color: '#2196F3', cbColor: '#005AB5' }, 
        rapid:  { cost: 75,  range: 90,  damage: 8,   cooldown: 15, color: '#FFEB3B', cbColor: '#FFC20A' }, 
        laser:  { cost: 125, range: 110, damage: 2,   cooldown: 2,  color: '#00BCD4', cbColor: '#332288' }, 
        sniper: { cost: 100, range: 300, damage: 60,  cooldown: 120, color: '#9C27B0', cbColor: '#D55E00' },
        heavy:  { cost: 150, range: 140, damage: 120, cooldown: 180, color: '#212121', cbColor: '#000000' }  
    };

    const enemyDefinitions = {
        normal: { hp: 50,   speed: 1.2, color: '#F44336', cbColor: '#DC3220', radius: 12, reward: 10, shape: 'circle' },
        fast:   { hp: 30,   speed: 2.5, color: '#FF9800', cbColor: '#E66100', radius: 10, reward: 15, shape: 'triangle' },
        tank:   { hp: 150,  speed: 0.7, color: '#8B0000', cbColor: '#5D3A9B', radius: 16, reward: 25, shape: 'square' },
        boss:   { hp: 1000, speed: 0.5, color: '#000000', cbColor: '#000000', radius: 25, reward: 150, shape: 'star' },
        mutant:  { hp: 1500, speed: 1.5, color: '#8BC34A', cbColor: '#40B0A6', radius: 14, reward: 50, shape: 'diamond' },
        phantom: { hp: 800,  speed: 3.0, color: '#E0E0E0', cbColor: '#999999', radius: 10, reward: 40, shape: 'triangle' },
        mecha:   { hp: 3500, speed: 0.6, color: '#607D8B', cbColor: '#1A85FF', radius: 18, reward: 60, shape: 'square' },
        omega_boss: { hp: 20000, speed: 0.4, color: '#4A148C', cbColor: '#D41159', radius: 35, reward: 500, shape: 'star' }
    };

    // --- FUNCIONES DE INTERFAZ Y MODALES ---
    function openSettings() {
        if (!isPaused && !isGameOver) togglePause();
        document.getElementById('settings-modal').style.display = 'flex';
        updateSettingsUI();
    }
    
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('#lang-es, #lang-en, #lang-ja, #lang-de').forEach(b => b.classList.remove('active'));
        document.getElementById('lang-' + lang).classList.add('active');
        updateUI();
        updateSettingsUI();
    }

    function toggleColorblind() {
        isColorblindMode = !isColorblindMode;
        saveProgress();
        updateSettingsUI();
    }

    function updateSettingsUI() {
        const text = dict[currentLang];
        document.getElementById('t-settings-title').innerText = text.settingsTitle;
        document.getElementById('t-lang').innerText = text.lang;
        document.getElementById('t-map').innerText = text.map;
        document.getElementById('t-diff').innerText = text.diff;
        document.getElementById('t-accessibility').innerText = text.accessibility;
        document.getElementById('t-close').innerText = text.close;
        
        document.getElementById('btn-map1').innerText = text.map1;
        document.getElementById('btn-map2').innerText = text.map2;
        document.getElementById('btn-normal').innerText = text.normal;
        document.getElementById('btn-hard').innerText = text.hard;
        document.getElementById('btn-bug').innerText = text.bugMode;

        const cbBtn = document.getElementById('btn-colorblind');
        cbBtn.innerText = isColorblindMode ? text.cbOn : text.cbOff;
        cbBtn.className = isColorblindMode ? 'toggle-btn active' : 'toggle-btn';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.getElementById('settings-modal').style.display === 'flex') closeSettings();
            else togglePause();
        }
    });

    function togglePause() {
        if (isGameOver && gameMode !== 'bug') return; 
        isPaused = !isPaused;
        const btn = document.getElementById('btn-pause');
        
        if (isPaused) {
            btn.innerText = `▶️ ${dict[currentLang].resume}`;
            btn.style.backgroundColor = '#4CAF50';
            btn.style.color = 'white';
        } else {
            btn.innerText = `⏸️ ${dict[currentLang].pause}`;
            btn.style.backgroundColor = '#FFC107';
            btn.style.color = 'black';
        }
    }

    function setMap(index) {
        currentMapIndex = index;
        document.getElementById('btn-map1').classList.remove('active');
        document.getElementById('btn-map2').classList.remove('active');
        document.getElementById(index === 0 ? 'btn-map1' : 'btn-map2').classList.add('active');
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function setDifficulty(mode) {
        gameMode = mode;
        document.getElementById('btn-normal').classList.remove('active');
        document.getElementById('btn-hard').classList.remove('active');
        document.getElementById('btn-bug').classList.remove('active');
        
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('perm-panel').style.display = (mode === 'hard') ? 'none' : 'block';
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function updateUI() {
        const text = dict[currentLang];
        
        const btnPause = document.getElementById('btn-pause');
        if (btnPause) {
            btnPause.innerText = isPaused ? `▶️ ${text.resume}` : `⏸️ ${text.pause}`;
        }
        
        document.getElementById('btn-settings').innerText = `⚙️ ${text.settings}`;
        document.getElementById('t-wave').innerText = text.wave;
        document.getElementById('t-lives').innerText = text.lives;
        document.getElementById('t-gold').innerText = text.gold;
        document.getElementById('t-build').innerText = text.build;
        
        document.getElementById('btn-basic').innerHTML = text.basic;
        document.getElementById('btn-rapid').innerHTML = text.rapid;
        document.getElementById('btn-laser').innerHTML = text.laser;
        document.getElementById('btn-sniper').innerHTML = text.sniper;
        document.getElementById('btn-heavy').innerHTML = text.heavy;
        
        document.getElementById('next-wave-btn').innerText = text.startWave;
        document.getElementById('rush-wave-btn').innerText = text.rushWave;
        document.getElementById('upgrade-all-btn').innerText = text.upgradeAll;
        
        document.getElementById('t-selected').innerText = text.selected;
        document.getElementById('t-lvl').innerText = text.lvl;
        document.getElementById('t-dmg').innerText = text.dmg;
        
        document.getElementById('t-perm-title').innerText = text.permTitle;
        document.getElementById('t-perm-gold').innerText = text.permGold;
        document.getElementById('t-perm-lives').innerText = text.permLives;
        document.getElementById('t-perm-tower').innerText = text.permTower;

        document.getElementById('t-game-over-title').innerText = text.gameOverTitle;
        document.getElementById('play-again-btn').innerText = text.playAgain;
        document.getElementById('hard-death-text').innerText = text.hardDeath;

        document.getElementById('gold-display').innerText = gold;
        document.getElementById('lives-display').innerText = lives;
        document.getElementById('wave-display').innerText = wave;
        
        document.getElementById('perm-gold').innerText = permanentUpgrades.bonusGold;
        document.getElementById('perm-lives').innerText = permanentUpgrades.bonusLives;
        
        const towerNames = { 'basic': '🟦', 'rapid': '🟨', 'laser': '🟢', 'sniper': '🟪', 'heavy': '⬛' };
        document.getElementById('perm-tower').innerText = permanentUpgrades.freeTower ? towerNames[permanentUpgrades.freeTower] : "-";
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            document.getElementById('tower-dmg').innerText = Math.floor(selectedTowerInstance.damage);
            document.getElementById('upgrade-btn').innerText = text.btnUpgrade + selectedTowerInstance.getUpgradeCost() + "$)";
            document.getElementById('upgrade-max-btn').innerText = text.btnMaxUpgrade;
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function selectTower(type) {
        selectedTowerType = type;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        if (type) document.getElementById('btn-' + type).classList.add('selected');
        selectedTowerInstance = null; 
        updateUI();
    }

    function isPointOnPath(px, py) {
        const pathPoints = maps[currentMapIndex].points;
        const pathWidth = 45; 
        const safeMargin = (pathWidth / 2) + 15; 

        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i];
            const p2 = pathPoints[i+1];
            const l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
            if (l2 === 0) continue;

            let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
            t = Math.max(0, Math.min(1, t));

            const projX = p1.x + t * (p2.x - p1.x);
            const projY = p1.y + t * (p2.y - p1.y);

            const dist = Math.hypot(px - projX, py - projY);

            if (dist < safeMargin) return true; 
        }
        return false;
    }

    // === CLASES ===
    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.radius = this.def.radius;
            this.reward = this.def.reward;
            this.waypointIndex = 0;
            
            const currentPath = maps[currentMapIndex].points;
            this.x = currentPath[0].x;
            this.y = currentPath[0].y;
        }

        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.beginPath();
            
            if (isColorblindMode && this.def.shape !== 'circle') {
                if (this.def.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y + this.radius);
                } else if (this.def.shape === 'square') {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                } else if (this.def.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y);
                    ctx.lineTo(this.x, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y);
                } else if (this.def.shape === 'star') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                }
            } else {
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            }
            ctx.fill();

            // Barra de vida
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen';
            ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }

        update() {
            const currentPath = maps[currentMapIndex].points;
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;

            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.x = target.x;
                this.y = target.y;
                this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--;
                    this.hp = 0; 
                    updateUI();
                    
                    if (lives <= 0) {
                        if (gameMode === 'bug') handleGameOver(); 
                        else if (!isGameOver) handleGameOver(); 
                    }
                }
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; 
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost; this.level++;
                this.damage *= 1.3; this.range *= 1.05; 
                return true; 
            } return false;
        }

        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            
            if(isColorblindMode) {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.beginPath();
                if(this.type === 'laser') { ctx.arc(this.x, this.y, 5, 0, Math.PI*2); }
                else if(this.type === 'sniper') { ctx.moveTo(this.x-10, this.y); ctx.lineTo(this.x+10, this.y); ctx.moveTo(this.x, this.y-10); ctx.lineTo(this.x, this.y+10); }
                else { ctx.rect(this.x - this.width/4, this.y - this.width/4, this.width/2, this.width/2); }
                ctx.stroke();
            }

            ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            ctx.fillText("L" + this.level, this.x, this.y + 18);
            
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    const pColor = isColorblindMode ? this.def.cbColor : this.def.color;
                    projectiles.push(new Projectile(this.x, this.y, target, this.damage, pColor));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage, color) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; 
            this.color = color; this.speed = 10;
        }
        draw() {
            ctx.fillStyle = this.color; 
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    // --- MANEJO DEL JUEGO ---
    function handleGameOver() {
        isGameOver = true;
        const overlay = document.getElementById('game-over-overlay');
        document.getElementById('game-over-text').innerText = dict[currentLang].gameOverText + wave;
        
        if (gameMode === 'hard') {
            document.getElementById('hard-death-text').style.display = 'block';
        } else {
            permanentUpgrades.bonusGold += 25;
            permanentUpgrades.bonusLives += 2;
            const towerTypes = ['basic', 'rapid', 'laser', 'sniper', 'heavy'];
            permanentUpgrades.freeTower = towerTypes[Math.floor(Math.random() * towerTypes.length)];
            document.getElementById('hard-death-text').style.display = 'none';
            saveProgress();
        }
        
        overlay.style.display = 'flex';

        if (gameMode !== 'bug') {
            isPaused = true;
        }
    }

    function restartFromGameOver() {
        document.getElementById('game-over-overlay').style.display = 'none';
        resetGame(false);
    }

    function resetGame(forceClean) {
        isGameOver = false;
        
        if (gameMode === 'hard' || forceClean) {
            gold = 150; lives = 20;
        } else {
            gold = 150 + permanentUpgrades.bonusGold;
            lives = 20 + permanentUpgrades.bonusLives;
        }
        
        wave = 0; enemies = []; towers = []; projectiles = [];
        enemiesToSpawn = []; isWaveActive = false; 
        
        selectedTowerType = null;
        selectedTowerInstance = null;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        
        isPaused = false;
        const btn = document.getElementById('btn-pause');
        btn.innerText = `⏸️ ${dict[currentLang].pause}`;
        btn.style.backgroundColor = '#FFC107';
        btn.style.color = 'black';

        if (gameMode !== 'hard' && !forceClean && permanentUpgrades.freeTower) {
            towers.push(new Tower(100, 100, permanentUpgrades.freeTower));
        }
        updateUI();
    }

    // Eventos del Mouse en el Canvas
    canvas.addEventListener('click', (e) => {
        if (isPaused || (isGameOver && gameMode !== 'bug')) return; 
        
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left; 
        const my = e.clientY - rect.top;

        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) {
                selectedTowerInstance = t; updateUI(); return;
            }
        }
        
        if (isPointOnPath(mx, my)) return; 

        const def = towerDefinitions[selectedTowerType];
        if (def && gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; 
            selectedTowerInstance = towers[towers.length - 1]; 
            
            selectedTowerType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            
            updateUI();
        } else if (!def) {
            selectedTowerInstance = null;
            updateUI();
        }
    });

    // Funciones de Mejora
    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function maxUpgradeSelectedTower() {
        if (isPaused || !selectedTowerInstance) return;
        let upgradedAny = false;
        // Mientras el dinero sea mayor o igual al costo de mejora actual, seguir mejorando
        while (gold >= selectedTowerInstance.getUpgradeCost()) {
            selectedTowerInstance.upgrade();
            upgradedAny = true;
        }
        if (upgradedAny) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) {
            while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; }
        }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);

        if (wave % 5 === 0) {
            if (wave >= 100) { enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier)); } 
            else { enemiesToSpawn.push(new Enemy('boss', hpMultiplier)); }
            count = Math.floor(count / 2); 
        }

        for (let i = 0; i < count; i++) {
            let r = Math.random();
            let type = 'normal';
            
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha';
                else if (r > 0.6) type = 'phantom';
                else if (r > 0.4) type = 'mutant';
                else if (r > 0.3) type = 'tank';
                else if (r > 0.1) type = 'fast';
            } else {
                if (wave > 2 && r > 0.6) type = 'fast';
                if (wave > 3 && r > 0.8) type = 'tank';
            }
            
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; 
            enemies.push(e); staggerDistance += 12; 
        }
    }

    // Bucle Principal
    function gameLoop() {
        const currentMap = maps[currentMapIndex];
        ctx.fillStyle = currentMap.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = currentMap.pathColor; 
        ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentMap.points[0].x, currentMap.points[0].y);
        for (let i = 1; i < currentMap.points.length; i++) {
            ctx.lineTo(currentMap.points[i].x, currentMap.points[i].y);
        }
        ctx.stroke();

        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) {
                    enemies.push(enemiesToSpawn.shift()); spawnTimer = 0;
                } else if (enemiesToSpawn.length === 0 && enemies.length === 0) {
                    isWaveActive = false; 
                }
            }

            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1);
            }
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].hp <= 0) enemies.splice(i, 1);
            }
        }

        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();

        // Texto de pausa estilo clásico sobre el canvas (por si se pausa desde el botón)
        if (isPaused && (!isGameOver || gameMode === 'bug')) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(dict[currentLang].pausedText, canvas.width / 2, canvas.height / 2);
        }

        requestAnimationFrame(gameLoop);
    }

    updateSettingsUI();
    resetGame(false);
    gameLoop();
</script>
