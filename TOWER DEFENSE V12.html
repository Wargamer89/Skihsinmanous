<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense - Mobile Optimized</title>
    <style>
        /* === ESTILOS GLOBALES === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation; /* Mejora la respuesta táctil */
        }
        
        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 800px; /* Tamaño máximo en PC */
            max-height: 600px;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Canvas se adapta a la pantalla manteniendo su proporción */
        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            aspect-ratio: 4 / 3;
            display: block;
            cursor: crosshair;
        }

        /* === UI TOP LEFT (Pausa y Ajustes) === */
        #top-left-ui {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            gap: 10px;
            z-index: 5;
        }

        .icon-btn {
            background: linear-gradient(145deg, #FFC107, #FF9800);
            color: #000;
            font-weight: bold;
            font-size: 16px;
            padding: 8px 15px;
            border: 2px solid #fff;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            transition: transform 0.1s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .icon-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
        .icon-btn.settings-btn { background: linear-gradient(145deg, #607D8B, #455A64); color: white; }

        /* === UI TOP RIGHT (Stats) === */
        #top-right-ui {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            border: 2px solid #555;
            z-index: 5;
            backdrop-filter: blur(4px);
        }
        .stat-item {
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .stat-item span { color: #FFD700; }
        .stat-item.lives span { color: #FF5252; }

        /* === UI PANEL DERECHO (Torres y Acciones) === */
        #right-panel {
            position: absolute;
            top: 70px;
            right: 15px;
            width: 220px;
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #444;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 5;
            backdrop-filter: blur(5px);
            box-sizing: border-box;
        }

        .panel-title { margin: 0 0 5px 0; font-size: 16px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 5px; }

        .tower-buttons-container { display: flex; flex-direction: column; gap: 6px; }
        .action-buttons-container { display: flex; flex-direction: column; gap: 6px; margin-top: auto; }

        button.tower-btn, .action-btn {
            background: linear-gradient(145deg, #444, #333);
            color: white; border: 1px solid #666; padding: 8px; border-radius: 8px;
            cursor: pointer; transition: 0.2s; font-size: 13px; text-align: left; width: 100%;
        }
        button.tower-btn:hover, .action-btn:hover { background: linear-gradient(145deg, #555, #444); transform: translateY(-2px); }
        button.tower-btn.selected { background: linear-gradient(145deg, #1976D2, #1565C0); border: 2px solid #fff; }
        
        .action-btn.start { background: linear-gradient(145deg, #4CAF50, #388E3C); text-align: center; font-size: 15px;}
        .action-btn.rush { background: linear-gradient(145deg, #E53935, #C62828); text-align: center; }
        .action-btn.upgrade-all { background: linear-gradient(145deg, #8E24AA, #6A1B9A); text-align: center; }

        #upgrade-panel {
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 8px; display: none;
            margin-top: 5px; border: 1px solid #ff9800; text-align: center;
        }

        /* === UI BOTTOM LEFT (Perm Upgrades) === */
        #bottom-left-ui {
            position: absolute; bottom: 15px; left: 15px; background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px; border-radius: 12px; border: 2px solid #555; z-index: 5;
            font-size: 13px; backdrop-filter: blur(4px);
        }
        #bottom-left-ui h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa;}
        #bottom-left-ui p { margin: 2px 0; }
        #bottom-left-ui span { color: #4CAF50; font-weight: bold; }

        /* === MODALES (Ajustes y GameOver) === */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 15px; border: 2px solid #555;
            width: 320px; max-width: 90%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            max-height: 90vh; overflow-y: auto;
        }

        .modal-content h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px; font-size: 20px;}

        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #ccc; font-size: 13px;}
        
        .btn-group { display: flex; gap: 5px; }
        .btn-group button {
            flex: 1; padding: 8px 4px; background: #444; color: white; border: 1px solid #666;
            border-radius: 5px; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-group button.active { background: #2196F3; font-weight: bold; border-color: #fff; }
        .btn-group button.hard.active { background: #E53935; }
        .btn-group button.bug.active { background: #9C27B0; }
        
        .toggle-btn {
            background: #444; color: white; border: 1px solid #666; padding: 10px; width: 100%;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 13px;
        }
        .toggle-btn.active { background: #FF9800; border-color: #fff; color: #000; }

        .close-modal-btn {
            background: #4CAF50; color: white; border: none; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%;
        }
        .close-modal-btn:hover { background: #388E3C; }

        #game-over-overlay h1 { color: #F44336; font-size: 40px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; text-align: center;}
        #game-over-text { font-size: 20px; margin-bottom: 10px; font-weight: bold; text-align: center;}
        #hard-death-text { color: #ff9800; font-size: 14px; margin-bottom: 30px; display: none; text-align: center;}
        #play-again-btn {
            background-color: #4CAF50; color: white; border: none; cursor: pointer;
            font-size: 18px; padding: 12px 30px; border-radius: 8px; font-weight: bold;
        }

        #pause-indicator {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 50px; font-weight: bold; color: rgba(255,255,255,0.8); z-index: 4; pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,1); text-align: center; width: 100%;
        }

        /* =========================================
           ADAPTACIÓN PARA CELULARES (MOBILE-FIRST)
           ========================================= */
        @media (max-width: 768px) {
            #game-wrapper { border-radius: 0; }
            
            #top-left-ui { top: 5px; left: 5px; gap: 5px; }
            .icon-btn { padding: 5px 10px; font-size: 12px; }

            #top-right-ui { top: 5px; right: 5px; padding: 5px 10px; gap: 8px; font-size: 14px; border-radius: 10px;}
            .stat-item { font-size: 14px; }

            /* Panel derecho pasa abajo */
            #right-panel {
                top: auto; bottom: 0; left: 0; right: 0; width: 100%;
                border-radius: 15px 15px 0 0; padding: 10px 5px; gap: 5px;
                background: rgba(15, 15, 15, 0.95); border: none; border-top: 2px solid #555;
            }

            .panel-title { display: none; } /* Ocultar título para ahorrar espacio */
            
            .tower-buttons-container { flex-direction: row; justify-content: center; }
            button.tower-btn { flex: 1; padding: 5px; text-align: center; font-size: 16px; margin-bottom: 0;}
            button.tower-btn span { display: none; } /* Ocultar texto descriptivo, solo ícono y precio */
            
            .action-buttons-container { flex-direction: row; }
            .action-btn { margin-bottom: 0; padding: 10px 5px; font-size: 12px;}

            /* Panel de mejoras sube arriba de la barra inferior */
            #upgrade-panel {
                position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%);
                width: 250px; z-index: 10;
            }

            /* Ocultar mejoras permanentes en pantalla de juego móvil para no saturar */
            #bottom-left-ui { display: none; }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="top-left-ui">
        <button id="btn-pause" class="icon-btn" onclick="togglePause()">⏸️ <span id="t-pause">Pausa</span></button>
        <button id="btn-settings" class="icon-btn settings-btn" onclick="openSettings()">⚙️</button>
    </div>

    <div id="top-right-ui">
        <div class="stat-item"><span id="t-wave-short">O:</span> <span id="wave-display" style="color:white;">0</span></div>
        <div class="stat-item lives">💖 <span id="lives-display" style="color:white;">20</span></div>
        <div class="stat-item">💰 <span id="gold-display" style="color:white;">150</span></div>
    </div>

    <div id="right-panel">
        <h3 class="panel-title" id="t-build">Construir Torres</h3>
        
        <div class="tower-buttons-container">
            <button id="btn-basic" class="tower-btn selected" onclick="selectTower('basic')">🟦 <span class="t-txt">Básica ($50)</span></button>
            <button id="btn-laser" class="tower-btn" onclick="selectTower('laser')">🟢 <span class="t-txt">Láser ($125)</span></button>
            <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')">🟨 <span class="t-txt">Rápida ($75)</span></button>
            <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')">🟪 <span class="t-txt">Sniper ($100)</span></button>
            <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')">⬛ <span class="t-txt">Pesada ($150)</span></button>
        </div>

        <div id="upgrade-panel">
            <h3 class="panel-title" id="t-selected" style="font-size:14px; margin-top:0;">Torre Sel.</h3>
            <p style="margin:5px 0;"><span id="t-lvl">Nvl:</span> <span id="tower-lvl"></span> | <span id="t-dmg">Daño:</span> <span id="tower-dmg"></span></p>
            <button id="upgrade-btn" class="action-btn" onclick="upgradeSelectedTower()" style="background-color: #ff9800; color: black; margin-bottom:0;"></button>
        </div>

        <div class="action-buttons-container">
            <button id="next-wave-btn" class="action-btn start" onclick="startWave()"></button>
            <button id="rush-wave-btn" class="action-btn rush" onclick="rushWave()"></button>
            <button id="upgrade-all-btn" class="action-btn upgrade-all" onclick="upgradeAllTowers()"></button>
        </div>
    </div>

    <div id="bottom-left-ui">
        <h3 id="t-perm-title">Mejoras Permanentes</h3>
        <p><span id="t-perm-gold">+ Oro:</span> <span id="perm-gold">0</span></p>
        <p><span id="t-perm-lives">+ Vidas:</span> <span id="perm-lives">0</span></p>
        <p><span id="t-perm-tower">Torre:</span> <span id="perm-tower">-</span></p>
    </div>

    <div id="pause-indicator">PAUSA</div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="t-settings-title">Configuración</h2>
            
            <div class="setting-group">
                <label id="t-lang">Idioma</label>
                <div class="btn-group">
                    <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
                    <button id="lang-en" onclick="setLanguage('en')">EN</button>
                    <button id="lang-ja" onclick="setLanguage('ja')">JA</button>
                    <button id="lang-de" onclick="setLanguage('de')">DE</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-map">Mapa (Reinicia partida)</label>
                <div class="btn-group">
                    <button id="btn-map1" class="active" onclick="setMap(0)">Mapa 1</button>
                    <button id="btn-map2" onclick="setMap(1)">Mapa 2</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-diff">Dificultad (Reinicia partida)</label>
                <div class="btn-group">
                    <button id="btn-normal" class="active" onclick="setDifficulty('normal')">Normal</button>
                    <button id="btn-hard" class="hard" onclick="setDifficulty('hard')">Hard</button>
                    <button id="btn-bug" class="bug" onclick="setDifficulty('bug')">Bug</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-accessibility">Accesibilidad</label>
                <button id="btn-colorblind" class="toggle-btn" onclick="toggleColorblind()">👁️ Modo Daltónico: OFF</button>
            </div>

            <button class="close-modal-btn" onclick="closeSettings()" id="t-close">Cerrar</button>
        </div>
    </div>

    <div id="game-over-overlay" class="modal-overlay">
        <div class="modal-content" style="background: rgba(30,30,30,0.95); max-width: 400px;">
            <h1 id="t-game-over-title">Terminado</h1>
            <p id="game-over-text"></p>
            <p id="hard-death-text">Modo Hard: Sin mejoras permanentes.</p>
            <button id="play-again-btn" onclick="restartFromGameOver()"></button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

    let currentLang = 'es';
    let gameMode = 'normal'; 
    let currentMapIndex = 0;
    let isPaused = false;
    let isGameOver = false;
    let isColorblindMode = false; 

    let permanentUpgrades = { bonusGold: 0, bonusLives: 0, freeTower: null };

    function loadProgress() {
        const saved = localStorage.getItem('td_permanentUpgrades_v5');
        if (saved) permanentUpgrades = JSON.parse(saved);
        
        const cbSaved = localStorage.getItem('td_colorblind');
        if (cbSaved) isColorblindMode = cbSaved === 'true';
    }
    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades_v5', JSON.stringify(permanentUpgrades));
        localStorage.setItem('td_colorblind', isColorblindMode);
    }
    loadProgress();

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let gold = 150, lives = 20, wave = 0;
    let enemies = [], towers = [], projectiles = [], enemiesToSpawn = [];
    let isWaveActive = false, spawnTimer = 0;

    function openSettings() {
        if (!isPaused && !isGameOver) togglePause();
        document.getElementById('settings-modal').style.display = 'flex';
        updateSettingsUI();
    }
    
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('#lang-es, #lang-en, #lang-ja, #lang-de').forEach(b => b.classList.remove('active'));
        document.getElementById('lang-' + lang).classList.add('active');
        updateUI();
        updateSettingsUI();
    }

    function toggleColorblind() {
        isColorblindMode = !isColorblindMode;
        saveProgress();
        updateSettingsUI();
    }

    function updateSettingsUI() {
        const text = dict[currentLang];
        document.getElementById('t-settings-title').innerText = text.settingsTitle;
        document.getElementById('t-lang').innerText = text.lang;
        document.getElementById('t-map').innerText = text.map;
        document.getElementById('t-diff').innerText = text.diff;
        document.getElementById('t-accessibility').innerText = text.accessibility;
        document.getElementById('t-close').innerText = text.close;
        
        document.getElementById('btn-map1').innerText = text.map1;
        document.getElementById('btn-map2').innerText = text.map2;
        document.getElementById('btn-normal').innerText = text.normal;
        document.getElementById('btn-hard').innerText = text.hard;
        document.getElementById('btn-bug').innerText = text.bugMode;

        const cbBtn = document.getElementById('btn-colorblind');
        cbBtn.innerText = isColorblindMode ? text.cbOn : text.cbOff;
        cbBtn.className = isColorblindMode ? 'toggle-btn active' : 'toggle-btn';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.getElementById('settings-modal').style.display === 'flex') closeSettings();
            else togglePause();
        }
    });

    function togglePause() {
        if (isGameOver && gameMode !== 'bug') return; 
        isPaused = !isPaused;
        
        const btn = document.getElementById('btn-pause');
        const overlay = document.getElementById('pause-indicator');
        
        if (isPaused) {
            btn.innerHTML = `▶️ <span id="t-pause">${dict[currentLang].resume}</span>`;
            overlay.style.display = 'block';
            overlay.innerText = dict[currentLang].pausedText;
        } else {
            btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;
            overlay.style.display = 'none';
        }
    }

    function setMap(index) {
        currentMapIndex = index;
        document.getElementById('btn-map1').classList.remove('active');
        document.getElementById('btn-map2').classList.remove('active');
        document.getElementById(index === 0 ? 'btn-map1' : 'btn-map2').classList.add('active');
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function setDifficulty(mode) {
        gameMode = mode;
        document.getElementById('btn-normal').classList.remove('active');
        document.getElementById('btn-hard').classList.remove('active');
        document.getElementById('btn-bug').classList.remove('active');
        
        document.getElementById('btn-' + mode).classList.add('active');
        
        // El panel perm solo desaparece en UI de PC, en celular ya está oculto
        const permUi = document.getElementById('bottom-left-ui');
        if(window.innerWidth > 768) {
            permUi.style.display = (mode === 'hard') ? 'none' : 'block';
        }
        
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function updateUI() {
        const text = dict[currentLang];
        
        if(document.getElementById('t-pause')) {
            document.getElementById('t-pause').innerText = isPaused ? text.resume : text.pause;
        }
        if(document.getElementById('pause-indicator')) {
            document.getElementById('pause-indicator').innerText = text.pausedText;
        }

        document.getElementById('t-wave-short').innerText = text.waveShort;
        document.getElementById('t-build').innerText = text.build;
        
        // Actualizar textos respetando spans
        document.getElementById('btn-basic').innerHTML = `${towerDefinitions.basic.icon} <span class="t-txt">${text.basic}</span>`;
        document.getElementById('btn-laser').innerHTML = `${towerDefinitions.laser.icon} <span class="t-txt">${text.laser}</span>`;
        document.getElementById('btn-rapid').innerHTML = `${towerDefinitions.rapid.icon} <span class="t-txt">${text.rapid}</span>`;
        document.getElementById('btn-sniper').innerHTML = `${towerDefinitions.sniper.icon} <span class="t-txt">${text.sniper}</span>`;
        document.getElementById('btn-heavy').innerHTML = `${towerDefinitions.heavy.icon} <span class="t-txt">${text.heavy}</span>`;
        
        document.getElementById('next-wave-btn').innerText = text.startWave;
        document.getElementById('rush-wave-btn').innerText = text.rushWave;
        document.getElementById('upgrade-all-btn').innerText = text.upgradeAll;
        
        document.getElementById('t-selected').innerText = text.selected;
        document.getElementById('t-lvl').innerText = text.lvl;
        document.getElementById('t-dmg').innerText = text.dmg;
        
        document.getElementById('t-perm-title').innerText = text.permTitle;
        document.getElementById('t-perm-gold').innerText = text.permGold;
        document.getElementById('t-perm-lives').innerText = text.permLives;
        document.getElementById('t-perm-tower').innerText = text.permTower;

        document.getElementById('t-game-over-title').innerText = text.gameOverTitle;
        document.getElementById('play-again-btn').innerText = text.playAgain;
        document.getElementById('hard-death-text').innerText = text.hardDeath;

        document.getElementById('gold-display').innerText = gold;
        document.getElementById('lives-display').innerText = lives;
        document.getElementById('wave-display').innerText = wave;
        
        document.getElementById('perm-gold').innerText = permanentUpgrades.bonusGold;
        document.getElementById('perm-lives').innerText = permanentUpgrades.bonusLives;
        
        document.getElementById('perm-tower').innerText = permanentUpgrades.freeTower ? towerDefinitions[permanentUpgrades.freeTower].icon : "-";
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            document.getElementById('tower-dmg').innerText = Math.floor(selectedTowerInstance.damage);
            document.getElementById('upgrade-btn').innerText = text.btnUpgrade + selectedTowerInstance.getUpgradeCost() + ")";
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function selectTower(type) {
        selectedTowerType = type;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        if (type) document.getElementById('btn-' + type).classList.add('selected');
        selectedTowerInstance = null; 
        updateUI();
    }

    // Comprobación de colisiones con el camino
    function isPointOnPath(px, py) {
        const pathPoints = maps[currentMapIndex].points;
        const pathWidth = 45; 
        const safeMargin = (pathWidth / 2) + 15; 

        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i];
            const p2 = pathPoints[i+1];
            const l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
            if (l2 === 0) continue;

            let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
            t = Math.max(0, Math.min(1, t));

            const projX = p1.x + t * (p2.x - p1.x);
            const projY = p1.y + t * (p2.y - p1.y);

            const dist = Math.hypot(px - projX, py - projY);

            if (dist < safeMargin) return true; 
        }
        return false;
    }

    // === CLASES ===
    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.radius = this.def.radius;
            this.reward = this.def.reward;
            this.waypointIndex = 0;
            
            const currentPath = maps[currentMapIndex].points;
            this.x = currentPath[0].x;
            this.y = currentPath[0].y;
        }

        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.beginPath();
            
            if (isColorblindMode && this.def.shape !== 'circle') {
                if (this.def.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y + this.radius);
                } else if (this.def.shape === 'square') {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                } else if (this.def.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - this.radius);
                    ctx.lineTo(this.x + this.radius, this.y);
                    ctx.lineTo(this.x, this.y + this.radius);
                    ctx.lineTo(this.x - this.radius, this.y);
                } else if (this.def.shape === 'star') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                }
            } else {
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            }
            ctx.fill();

            // Health Bar
            ctx.fillStyle = 'red';
            ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen';
            ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }

        update() {
            const currentPath = maps[currentMapIndex].points;
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;

            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.x = target.x;
                this.y = target.y;
                this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--;
                    this.hp = 0; 
                    updateUI();
                    
                    if (lives <= 0) {
                        if (gameMode === 'bug') handleGameOver(); 
                        else if (!isGameOver) handleGameOver(); 
                    }
                }
            } else {
                this.x += (dx / dist) * this.speed;
                this.y += (dy / dist) * this.speed;
            }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; 
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost; this.level++;
                this.damage *= 1.3; this.range *= 1.05; 
                return true; 
            } return false;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            
            if(isColorblindMode) {
                ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 2; ctx.beginPath();
                if(this.type === 'laser') { ctx.arc(this.x, this.y, 5, 0, Math.PI*2); }
                else if(this.type === 'sniper') { ctx.moveTo(this.x-10, this.y); ctx.lineTo(this.x+10, this.y); ctx.moveTo(this.x, this.y-10); ctx.lineTo(this.x, this.y+10); }
                else { ctx.rect(this.x - this.width/4, this.y - this.width/4, this.width/2, this.width/2); }
                ctx.stroke();
            }

            ctx.fillStyle = 'white'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            ctx.fillText("L" + this.level, this.x, this.y + 18);
            
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    const pColor = isColorblindMode ? this.def.cbColor : this.def.color;
                    projectiles.push(new Projectile(this.x, this.y, target, this.damage, pColor));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage, color) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; 
            this.color = color; this.speed = 10;
        }
        draw() {
            ctx.fillStyle = this.color; 
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    function handleGameOver() {
        isGameOver = true;
        const overlay = document.getElementById('game-over-overlay');
        document.getElementById('game-over-text').innerText = dict[currentLang].gameOverText + wave;
        
        if (gameMode === 'hard') {
            document.getElementById('hard-death-text').style.display = 'block';
        } else {
            permanentUpgrades.bonusGold += 25;
            permanentUpgrades.bonusLives += 2;
            const towerTypes = ['basic', 'rapid', 'laser', 'sniper', 'heavy'];
            permanentUpgrades.freeTower = towerTypes[Math.floor(Math.random() * towerTypes.length)];
            document.getElementById('hard-death-text').style.display = 'none';
            saveProgress();
        }
        
        overlay.style.display = 'flex';

        if (gameMode !== 'bug') {
            isPaused = true;
            document.getElementById('pause-indicator').style.display = 'none';
        }
    }

    function restartFromGameOver() {
        document.getElementById('game-over-overlay').style.display = 'none';
        resetGame(false);
    }

    function resetGame(forceClean) {
        isGameOver = false;
        
        if (gameMode === 'hard' || forceClean) {
            gold = 150; lives = 20;
        } else {
            gold = 150 + permanentUpgrades.bonusGold;
            lives = 20 + permanentUpgrades.bonusLives;
        }
        
        wave = 0; enemies = []; towers = []; projectiles = [];
        enemiesToSpawn = []; isWaveActive = false; 
        
        selectedTowerType = null;
        selectedTowerInstance = null;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        
        isPaused = false;
        document.getElementById('pause-indicator').style.display = 'none';
        
        const btn = document.getElementById('btn-pause');
        btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;

        if (gameMode !== 'hard' && !forceClean && permanentUpgrades.freeTower) {
            towers.push(new Tower(100, 100, permanentUpgrades.freeTower));
        }
        updateUI();
    }

    // === CÁLCULO DE TOQUE PARA PANTALLAS MÓVILES ===
    canvas.addEventListener('click', (e) => {
        if (isPaused || (isGameOver && gameMode !== 'bug')) return; 
        
        const rect = canvas.getBoundingClientRect();
        
        // Calcular escala real de la imagen renderizada vs lógica del canvas (800x600)
        const scaleX = 800 / rect.width;
        const scaleY = 600 / rect.height;

        // Posición ajustada para cualquier pantalla
        const mx = (e.clientX - rect.left) * scaleX; 
        const my = (e.clientY - rect.top) * scaleY;

        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) {
                selectedTowerInstance = t; updateUI(); return;
            }
        }
        
        if (isPointOnPath(mx, my)) return; 

        const def = towerDefinitions[selectedTowerType];
        if (def && gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; 
            selectedTowerInstance = towers[towers.length - 1]; 
            
            selectedTowerType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            
            updateUI();
        } else if (!def) {
            selectedTowerInstance = null;
            updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) {
            while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; }
        }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);

        if (wave % 5 === 0) {
            if (wave >= 100) { enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier)); } 
            else { enemiesToSpawn.push(new Enemy('boss', hpMultiplier)); }
            count = Math.floor(count / 2); 
        }

        for (let i = 0; i < count; i++) {
            let r = Math.random();
            let type = 'normal';
            
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha';
                else if (r > 0.6) type = 'phantom';
                else if (r > 0.4) type = 'mutant';
                else if (r > 0.3) type = 'tank';
                else if (r > 0.1) type = 'fast';
            } else {
                if (wave > 2 && r > 0.6) type = 'fast';
                if (wave > 3 && r > 0.8) type = 'tank';
            }
            
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; 
            enemies.push(e); staggerDistance += 12; 
        }
    }

    function gameLoop() {
        const currentMap = maps[currentMapIndex];
        ctx.fillStyle = currentMap.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = currentMap.pathColor; 
        ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentMap.points[0].x, currentMap.points[0].y);
        for (let i = 1; i < currentMap.points.length; i++) {
            ctx.lineTo(currentMap.points[i].x, currentMap.points[i].y);
        }
        ctx.stroke();

        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) {
                    enemies.push(enemiesToSpawn.shift()); spawnTimer = 0;
                } else if (enemiesToSpawn.length === 0 && enemies.length === 0) {
                    isWaveActive = false; 
                }
            }

            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1);
            }
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].hp <= 0) enemies.splice(i, 1);
            }
        }

        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();

        requestAnimationFrame(gameLoop);
    }

    updateSettingsUI();
    resetGame(false);
    gameLoop();
</script>
