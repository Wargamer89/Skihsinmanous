<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense V15 - Pro V14 Layout</title>
    <style>
        /* === ESTILOS GLOBALES (Pantalla Completa Responsive) === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; 
        }
        
        /* === CONTENEDOR PRINCIPAL FLEX (Mapa-Izquierda, Panel-Derecha) === */
        #game-layout {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* === ÁREA DEL MAPA (Responsive) === */
        #canvas-wrapper {
            flex-grow: 1; /* Ocupa todo el espacio izquierdo/central */
            height: 100%;
            position: relative;
            background-color: #222;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        /* === PANEL LATERAL FIJO (Estilo V14) === */
        #ui-side-panel {
            width: 280px; /* Ancho fijo para panel estilo V14 */
            height: 100%;
            background-color: #2a2a2a;
            border-left: 2px solid #555;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            z-index: 6;
            transition: order 0.3s ease; /* Para mover izq/der */
        }

        /* Clase para mover panel a la izquierda */
        #ui-side-panel.left {
            order: -1;
            border-left: none;
            border-right: 2px solid #555;
        }

        /* === ELEMENTOS INTERNOS DEL PANEL LATERAL === */
        
        /* Controles Superiores (Pausa/Ajustes) */
        .top-controls-wrapper {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        .icon-btn {
            background: linear-gradient(145deg, #444, #333); color: white;
            font-weight: bold; font-size: 14px; padding: 10px; border: 1px solid #666;
            border-radius: 8px; cursor: pointer; flex: 1; text-align: center;
        }
        .icon-btn:hover { background: linear-gradient(145deg, #555, #444); }
        .icon-btn#btn-pause.active { background: linear-gradient(145deg, #FFC107, #FF9800); color: #000; }

        /* Estadísticas */
        .stats-box {
            background: rgba(0, 0, 0, 0.4); padding: 15px; border-radius: 12px;
            border: 1px solid #555; margin-bottom: 20px;
        }
        .stat-item { font-size: 18px; font-weight: bold; margin: 8px 0; display: flex; align-items: center; gap: 8px; }
        .stat-item span { color: #FFD700; }
        .stat-item.lives span { color: #FF5252; }

        /* Cuadrícula de Construcción 2 Columnas */
        .panel-title { margin: 0 0 10px 0; font-size: 16px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 8px; }
        .tower-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;
        }
        button.tower-btn {
            background: linear-gradient(145deg, #444, #333); color: white; border: 1px solid #666; 
            padding: 10px 5px; border-radius: 8px; cursor: pointer; text-align: center;
            display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 12px;
        }
        button.tower-btn .t-icon { font-size: 24px; }
        button.tower-btn:hover { background: linear-gradient(145deg, #555, #444); transform: translateY(-2px); }
        button.tower-btn.selected { background: linear-gradient(145deg, #1976D2, #1565C0); border: 2px solid #fff; }

        /* Controles de Oleada */
        .wave-controls { display: flex; flex-direction: column; gap: 10px; margin-top: auto; }
        .action-btn {
            color: white; border: 1px solid #fff; padding: 12px; border-radius: 8px;
            font-weight: bold; font-size: 15px; cursor: pointer; text-align: center;
        }
        .action-btn.start { background: linear-gradient(145deg, #4CAF50, #388E3C); }
        .action-btn.rush { background: linear-gradient(145deg, #E53935, #C62828); }
        .action-btn.upgrade-all { background: linear-gradient(145deg, #8E24AA, #6A1B9A); }

        /* Panel de Mejoras Permanentes (Pasa a modal de Game Over) */
        #perm-panel-wrapper { display: none; }

        /* === OVERLAYS (Sobre el Canvas) === */
        #pause-indicator {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: bold; color: rgba(255,255,255,0.9); z-index: 5; pointer-events: none;
            text-shadow: 0 0 30px rgba(0,0,0,1); text-align: center; width: 100%;
        }

        /* === MODALES CENTRADOS === */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(3px);
        }
        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 15px; border: 2px solid #555;
            width: 420px; max-width: 90%; text-align: center;
        }
        .modal-content h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px;}
        .close-modal-btn {
            background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; border: 1px solid #fff; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; width: 100%;
        }

        /* === AJUSTES Y CORRECCIÓN ZH === */
        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 14px;}
        
        .btn-group { display: flex; gap: 5px; }
        .btn-group button {
            flex: 1; padding: 10px 5px; background: #444; color: white; border: 1px solid #666;
            border-radius: 5px; cursor: pointer; font-size: 13px;
        }
        /* CUADRÍCULA DE 5 IDIOMAS EN UNA FILA */
        .language-grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;
        }
        
        .btn-group button.active { background: #2196F3; font-weight: bold; border-color: #fff; }
        .btn-group button.hard.active { background: #E53935; }
        .btn-group button.bug.active { background: #9C27B0; }
        .toggle-btn { background: #444; color: white; border: 1px solid #666; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .toggle-btn.active { background: #FF9800; border-color: #fff; color: #000; }

        /* === GAME OVER MEJORADO === */
        #game-over-overlay h1 { color: #F44336; font-size: 50px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; }
        #hard-death-text { color: #ff9800; font-size: 15px; margin-bottom: 25px; display: none; }
        #play-again-btn {
            background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; border: 2px solid #fff; cursor: pointer;
            font-size: 18px; padding: 15px 40px; border-radius: 8px; font-weight: bold;
        }
    </div>
</div>

    // SCRIPT DE MIGRACIÓN Y GUARDADO V15
    function loadProgress() {
        let saved = localStorage.getItem('td_permanentUpgrades_v15');
        if (!saved) {
            // Migrar V14 si existe
            saved = localStorage.getItem('td_permanentUpgrades_v14');
            if(saved) localStorage.setItem('td_permanentUpgrades_v15', saved);
        }
        
        if (saved) permanentUpgrades = JSON.parse(saved);
        
        const cbSaved = localStorage.getItem('td_colorblind');
        if (cbSaved) isColorblindMode = cbSaved === 'true';

        const hudSaved = localStorage.getItem('td_hudPos');
        if (hudSaved) {
            hudPosition = hudSaved;
            updateHUDPositionVisual();
        }
    }
    
    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades_v15', JSON.stringify(permanentUpgrades));
        localStorage.setItem('td_colorblind', isColorblindMode);
        localStorage.setItem('td_hudPos', hudPosition);
    }
    loadProgress();

    function openSettings() {
        if (!isPaused && !isGameOver) togglePause();
        document.getElementById('settings-modal').style.display = 'flex';

    }
    
    function closeSettings() {
        document.getElementById('settings-modal').style.display = 'none';
    }

    function setLanguage(lang) {
        currentLang = lang;
        document.querySelectorAll('[id^="lang-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('lang-' + lang).classList.add('active');
        updateUI();
        updateSettingsUI();
    }

    function toggleColorblind() {
        isColorblindMode = !isColorblindMode;

    }

    function setHUDPosition(pos) {
        hudPosition = pos;

        updateHUDPositionVisual();
        updateSettingsUI();
    }

    function updateHUDPositionVisual() {
        const panel = document.getElementById('ui-side-panel');
        if (hudPosition === 'left') panel.classList.add('left');
        else panel.classList.remove('left');
    }

    function updateSettingsUI() {
        const text = dict[currentLang];
        document.getElementById('t-settings-title').innerText = text.settingsTitle;
        document.getElementById('t-lang').innerText = text.lang;
        document.getElementById('t-map').innerText = text.map;
        document.getElementById('t-diff').innerText = text.diff;

        document.getElementById('t-ui-pos').innerText = text.uiPos;

        cbBtn.innerText = isColorblindMode ? text.cbOn : text.cbOff;
        cbBtn.className = isColorblindMode ? 'toggle-btn active' : 'toggle-btn';
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            if (document.getElementById('settings-modal').style.display === 'flex') closeSettings();
            else togglePause();
        }
    });

    function togglePause() {
        if (isGameOver && gameMode !== 'bug') return; 
        isPaused = !isPaused;
        const btn = document.getElementById('btn-pause');
        const overlay = document.getElementById('pause-indicator');
        
        if (isPaused) {
            btn.innerHTML = `▶️ <span id="t-pause">${dict[currentLang].resume}</span>`;
            btn.classList.add('active');
            overlay.style.display = 'block';
            overlay.innerText = dict[currentLang].pausedText;
        } else {
            btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;
            btn.classList.remove('active');
            overlay.style.display = 'none';
        }
    }

    function setMap(index) {
        currentMapIndex = index;
        document.querySelectorAll('[id^="btn-map"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-map' + (index+1)).classList.add('active');
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function setDifficulty(mode) {
        gameMode = mode;
        document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        saveProgress(); 
        resetGame(true);
        closeSettings();
    }

    function updateUI() {
        const text = dict[currentLang];
        
        if(document.getElementById('t-pause')) document.getElementById('t-pause').innerText = isPaused ? text.resume : text.pause;
        if(document.getElementById('pause-indicator')) document.getElementById('pause-indicator').innerText = text.pausedText;

        document.getElementById('t-wave-short').innerText = text.waveShort;
        document.getElementById('t-build').innerText = text.build;
        
        // Formato para botones de cuadrícula
        function formatBtn(def, name) {
            return `<div class="t-icon">${def.icon}</div><div>${name}</div><div>$${def.cost}</div>`;
        }

        document.getElementById('btn-basic').innerHTML = formatBtn(towerDefinitions.basic, text.basic);
        document.getElementById('btn-laser').innerHTML = formatBtn(towerDefinitions.laser, text.laser);
        document.getElementById('btn-rapid').innerHTML = formatBtn(towerDefinitions.rapid, text.rapid);
        document.getElementById('btn-sniper').innerHTML = formatBtn(towerDefinitions.sniper, text.sniper);
        document.getElementById('btn-heavy').innerHTML = formatBtn(towerDefinitions.heavy, text.heavy);
        
        // Botón Titan con límite
        const titanCount = towers.filter(t => t.type === 'titan').length;
        document.getElementById('btn-titan').innerHTML = formatBtn(towerDefinitions.titan, text.titan) + `<div>(${titanCount}/3)</div>`;
        
        document.getElementById('next-wave-btn').innerText = text.startWave;
        document.getElementById('rush-wave-btn').innerText = text.rushWave;
        document.getElementById('upgrade-all-btn').innerText = text.upgradeAll;
        
        document.getElementById('t-selected').innerText = text.selected;
        document.getElementById('t-lvl').innerText = text.lvl;
        document.getElementById('t-dmg').innerText = text.dmg;
        
        document.getElementById('t-perm-title').innerText = text.permTitle;
        document.getElementById('t-perm-gold').innerText = text.permGold;
        document.getElementById('t-perm-lives').innerText = text.permLives;
        document.getElementById('t-perm-tower').innerText = text.permTower;

        document.getElementById('t-game-over-title').innerText = text.gameOverTitle;
        document.getElementById('play-again-btn').innerText = text.playAgain;
        document.getElementById('hard-death-text').innerText = text.hardDeath;

        document.getElementById('gold-display').innerText = gold;
        document.getElementById('lives-display').innerText = lives;
        document.getElementById('wave-display').innerText = wave;
        
        document.getElementById('perm-gold').innerText = permanentUpgrades.bonusGold;
        document.getElementById('perm-lives').innerText = permanentUpgrades.bonusLives;
        
        document.getElementById('perm-tower').innerText = permanentUpgrades.freeTower ? towerDefinitions[permanentUpgrades.freeTower].icon : "-";
        
        if (selectedTowerInstance) {
            document.getElementById('upgrade-panel').style.display = 'block';
            document.getElementById('tower-lvl').innerText = selectedTowerInstance.level;
            
            const mapMult = maps[currentMapIndex].dmgMult;
            const actualDmg = Math.floor(selectedTowerInstance.damage * mapMult);
            document.getElementById('tower-dmg').innerText = `${actualDmg} (${mapMult !== 1 ? (mapMult>1?'+25%':'-25%') : 'Normal'})`;
            
            document.getElementById('upgrade-btn').innerText = text.btnUpgrade + ` ($${selectedTowerInstance.getUpgradeCost()})`;
            document.getElementById('upgrade-max-btn').innerText = text.btnMax;
        } else {
            document.getElementById('upgrade-panel').style.display = 'none';
        }
    }

    function isPointOnPath(px, py) {
        const pathPoints = maps[currentMapIndex].points;
        const safeMargin = 22.5 + 15; 
        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i]; const p2 = pathPoints[i+1];
            const l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
            if (l2 === 0) continue;
            let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projX = p1.x + t * (p2.x - p1.x); const projY = p1.y + t * (p2.y - p1.y);
            if (Math.hypot(px - projX, py - projY) < safeMargin) return true; 
        }
        return false;
    }

    // === CLASES ===
    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.radius = this.def.radius;
            // Map Oro Bonus
            this.reward = Math.floor(this.def.reward * maps[currentMapIndex].goldMult);
            this.waypointIndex = 0;
            const currentPath = maps[currentMapIndex].points;
            this.x = currentPath[0].x; this.y = currentPath[0].y;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.beginPath();
            if (isColorblindMode && this.def.shape !== 'circle') {
                if (this.def.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y + this.radius);
                } else if (this.def.shape === 'square') {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                } else if (this.def.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y); ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
                } else if (this.def.shape === 'star') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                }
            } else { ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); }
            ctx.fill();
            ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen'; ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }
        update() {
            const currentPath = maps[currentMapIndex].points;
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;
            const dx = target.x - this.x; const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.x = target.x; this.y = target.y; this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--; this.hp = 0; updateUI();
                    if (lives <= 0) {
                        if (gameMode === 'bug') handleGameOver(); 
                        else if (!isGameOver) handleGameOver(); 
                    }
                }
            } else { this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed; }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; 
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost; this.level++;
                this.damage *= 1.3; this.range *= 1.05; 
                return true; 
            } return false;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            
            // DIBUJA EL EMOJI AL CENTRO DE LA TORRE
            ctx.fillStyle = 'white'; ctx.font = '16px Arial'; ctx.textAlign = 'center';
            ctx.fillText(this.def.icon, this.x, this.y + 6);
            
            // Dibuja nivel
            ctx.font = 'bold 10px Arial'; ctx.fillStyle = 'white';
            ctx.fillText("L" + this.level, this.x + 10, this.y + 14);
            
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    const pColor = isColorblindMode ? this.def.cbColor : this.def.color;
                    const finalDamage = this.damage * maps[currentMapIndex].dmgMult;
                    projectiles.push(new Projectile(this.x, this.y, target, finalDamage, pColor));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage, color) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; 
            this.color = color; this.speed = 10;
        }
        draw() { ctx.fillStyle = this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill(); }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    // === MANEJO DEL JUEGO ===
    function handleGameOver() {
        isGameOver = true;
        const overlay = document.getElementById('game-over-overlay');
        document.getElementById('game-over-text').innerText = dict[currentLang].gameOverText + wave;
        
        if (gameMode === 'hard') {
            document.getElementById('hard-death-text').style.display = 'block';
        } else {
            permanentUpgrades.bonusGold += 25;
            permanentUpgrades.bonusLives += 2;
            const towerTypes = ['basic', 'rapid', 'laser', 'sniper', 'heavy'];
            permanentUpgrades.freeTower = towerTypes[Math.floor(Math.random() * towerTypes.length)];
            document.getElementById('hard-death-text').style.display = 'none';
            saveProgress();
        }
        overlay.style.display = 'flex';
        if (gameMode !== 'bug') isPaused = true;
    }

    function restartFromGameOver() {
        document.getElementById('game-over-overlay').style.display = 'none';
        resetGame(false);
    }

    function resetGame(forceClean) {
        isGameOver = false;
        if (gameMode === 'hard' || forceClean) { gold = 150; lives = 20; }
        else { gold = 150 + permanentUpgrades.bonusGold; lives = 20 + permanentUpgrades.bonusLives; }
        wave = 0; enemies = []; towers = []; projectiles = [];
        enemiesToSpawn = []; isWaveActive = false; spawnTimer = 0;
        selectedTowerType = null; selectedTowerInstance = null;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        isPaused = false;
        const btn = document.getElementById('btn-pause');
        btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;
        btn.classList.remove('active');
        document.getElementById('pause-indicator').style.display = 'none';
        if (gameMode !== 'hard' && !forceClean && permanentUpgrades.freeTower) { towers.push(new Tower(100, 100, permanentUpgrades.freeTower)); }
        updateUI();
    }

    // === INTERACCIÓN CANVAS CON CORRECCIÓN DE TAMAÑO DINÁMICO ===
    canvas.addEventListener('click', (e) => {
        if (isPaused || (isGameOver && gameMode !== 'bug')) return; 
        
        // CORRECCIÓN TÁCTIL/MOUSE PARA CANVAS RESPONSIVE
        const rect = canvas.getBoundingClientRect();
        const logicalWidth = 800;
        const logicalHeight = 600;
        
        // Calcular escala entre el tamaño lógico interno y el tamaño visual visual
        const scaleX = logicalWidth / rect.width;
        const scaleY = logicalHeight / rect.height;

        // Calcular posición ajustada
        const mx = (e.clientX - rect.left) * scaleX; 
        const my = (e.clientY - rect.top) * scaleY;

        // 1. Verificar Selección
        let clickedTower = null;
        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) { clickedTower = t; break; }
        }
        if (clickedTower) { selectedTowerInstance = clickedTower; updateUI(); return; }

        // 2. Colocar nueva
        if (!selectedTowerType) { selectedTowerInstance = null; updateUI(); return; }
        if (isPointOnPath(mx, my)) return; 
        
        // 1px Colisión check
        for (let t of towers) { if (Math.hypot(t.x - mx, t.y - my) < 31) return; }

        // Límite Titán
        if(selectedTowerType === 'titan') {
            const titanCount = towers.filter(t => t.type === 'titan').length;
            if(titanCount >= 3) return;
        }

        const def = towerDefinitions[selectedTowerType];
        if (def && gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; selectedTowerType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function maxUpgradeSelectedTower() {
        if (isPaused || !selectedTowerInstance) return;
        let upgraded = false;
        while (gold >= selectedTowerInstance.getUpgradeCost()) {
            selectedTowerInstance.upgrade();
            upgraded = true;
        }
        if(upgraded) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) { while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; } }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);
        if (wave % 5 === 0) {
            if (wave >= 100) enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier));
            else enemiesToSpawn.push(new Enemy('boss', hpMultiplier));
            count = Math.floor(count / 2); 
        }
        for (let i = 0; i < count; i++) {
            let r = Math.random(); let type = 'normal';
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha'; else if (r > 0.6) type = 'phantom'; else if (r > 0.4) type = 'mutant'; else if (r > 0.3) type = 'tank'; else if (r > 0.1) type = 'fast';
            } else { if (wave > 2 && r > 0.6) type = 'fast'; if (wave > 3 && r > 0.8) type = 'tank'; }
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; enemies.push(e); staggerDistance += 12; 
        }
    }

    function gameLoop() {
        const currentMap = maps[currentMapIndex];
        ctx.fillStyle = currentMap.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = currentMap.pathColor; ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentMap.points[0].x, currentMap.points[0].y);
        for (let i = 1; i < currentMap.points.length; i++) ctx.lineTo(currentMap.points[i].x, currentMap.points[i].y);
        ctx.stroke();

        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) { enemies.push(enemiesToSpawn.shift()); spawnTimer = 0; }
                else if (enemiesToSpawn.length === 0 && enemies.length === 0) isWaveActive = false; 
            }
            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) { if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1); }
            for (let i = enemies.length - 1; i >= 0; i--) { enemies[i].update(); if (enemies[i].hp <= 0) enemies.splice(i, 1); }
        }
        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();
        requestAnimationFrame(gameLoop);
    }

    updateSettingsUI();
    resetGame(false);
    gameLoop();
</script>
