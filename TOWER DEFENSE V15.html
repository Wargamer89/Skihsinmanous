<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tower Defense V15 - Pro Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; 
        }
        
        #game-wrapper {
            position: relative;
            width: 100vw;
            max-width: 800px;
            aspect-ratio: 4 / 3; 
            box-shadow: 0 0 40px rgba(0,0,0,1);
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        #top-left-ui {
            position: absolute; top: 15px; left: 15px; display: flex; gap: 10px; z-index: 5;
        }

        .icon-btn {
            background: linear-gradient(145deg, #FFC107, #FF9800); color: #000;
            font-weight: bold; font-size: 16px; padding: 8px 15px; border: 2px solid #fff;
            border-radius: 8px; cursor: pointer; box-shadow: 2px 2px 8px rgba(0,0,0,0.6);
            transition: transform 0.1s; display: flex; align-items: center; gap: 5px;
        }
        .icon-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
        .icon-btn.settings-btn { background: linear-gradient(145deg, #607D8B, #455A64); color: white; }

        #top-right-ui {
            position: absolute; top: 15px; right: 15px; display: flex; gap: 15px;
            background: rgba(20, 20, 20, 0.75); padding: 10px 20px; border-radius: 20px;
            border: 2px solid #555; z-index: 5; backdrop-filter: blur(6px);
        }
        .stat-item { font-size: 18px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .stat-item span { color: #FFD700; }
        .stat-item.lives span { color: #FF5252; }

        #right-panel {
            position: absolute; top: 70px; right: 15px; width: 240px;
            background: rgba(20, 20, 20, 0.85); border: 2px solid #444; border-radius: 12px;
            padding: 15px; display: flex; flex-direction: column; gap: 10px; z-index: 5;
            backdrop-filter: blur(8px); box-sizing: border-box;
        }

        .panel-title { margin: 0 0 5px 0; font-size: 16px; text-align: center; border-bottom: 1px solid #555; padding-bottom: 5px; }
        
        /* NUEVO: CUADRÍCULA 2 COLUMNAS PARA TORRES */
        .tower-buttons-container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
        }
        
        .action-buttons-container { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        button.tower-btn, .action-btn {
            background: linear-gradient(145deg, #444, #333); color: white; border: 1px solid #666; 
            padding: 8px 5px; border-radius: 8px; cursor: pointer; transition: 0.2s; 
            font-size: 12px; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        button.tower-btn:hover, .action-btn:hover { background: linear-gradient(145deg, #555, #444); transform: translateY(-2px); }
        button.tower-btn.selected { background: linear-gradient(145deg, #1976D2, #1565C0); border: 2px solid #fff; }
        
        .action-btn { flex-direction: row; justify-content: center; padding: 10px; font-size: 14px;}
        .action-btn.start { background: linear-gradient(145deg, #4CAF50, #388E3C); }
        .action-btn.rush { background: linear-gradient(145deg, #E53935, #C62828); }
        .action-btn.upgrade-all { background: linear-gradient(145deg, #8E24AA, #6A1B9A); }

        /* PANEL DE MEJORA MEJORADO */
        #upgrade-panel {
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; display: none;
            margin-top: 5px; border: 2px solid #ff9800; text-align: center;
        }

        #bottom-left-ui {
            position: absolute; bottom: 15px; left: 15px; background: rgba(20, 20, 20, 0.8);
            padding: 10px 15px; border-radius: 12px; border: 2px solid #444; z-index: 5;
            font-size: 13px; backdrop-filter: blur(6px);
        }
        #bottom-left-ui h3 { margin: 0 0 5px 0; font-size: 14px; color: #aaa;}
        #bottom-left-ui p { margin: 3px 0; }
        #bottom-left-ui span { color: #4CAF50; font-weight: bold; }

        /* MODALES */
        .modal-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 20; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(3px);
        }

        .modal-content {
            background: #2a2a2a; padding: 25px; border-radius: 15px; border: 2px solid #555;
            width: 380px; max-width: 90%; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-content h2 { margin-top: 0; color: #fff; border-bottom: 2px solid #444; padding-bottom: 10px;}

        .setting-group { margin-bottom: 15px; text-align: left; }
        .setting-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #ccc; font-size: 14px;}
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 5px; }
        .btn-group button {
            flex: 1 1 20%; padding: 10px 5px; background: #444; color: white; border: 1px solid #666;
            border-radius: 5px; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-group button.active { background: #2196F3; font-weight: bold; border-color: #fff; }
        .btn-group button.hard.active { background: #E53935; }
        .btn-group button.bug.active { background: #9C27B0; }
        
        .toggle-btn { background: #444; color: white; border: 1px solid #666; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;}
        .toggle-btn.active { background: #FF9800; border-color: #fff; color: #000; }

        .close-modal-btn {
            background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; border: 1px solid #fff; padding: 12px 20px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%;
        }

        #game-over-overlay h1 { color: #F44336; font-size: 45px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; text-align: center;}
        #game-over-text { font-size: 22px; margin-bottom: 10px; font-weight: bold; text-align: center;}
        #hard-death-text { color: #ff9800; font-size: 15px; margin-bottom: 25px; display: none; text-align: center;}
        #play-again-btn {
            background: linear-gradient(145deg, #4CAF50, #388E3C); color: white; border: 2px solid #fff; cursor: pointer;
            font-size: 18px; padding: 12px 30px; border-radius: 8px; font-weight: bold; transition: transform 0.2s;
        }
        #play-again-btn:hover { transform: scale(1.05); }

        #pause-indicator {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 60px; font-weight: bold; color: rgba(255,255,255,0.9); z-index: 4; pointer-events: none;
            text-shadow: 0 0 30px rgba(0,0,0,1); text-align: center; width: 100%; letter-spacing: 5px;
        }

        @media (max-width: 768px) {
            #game-wrapper { border-radius: 0; }
            #top-left-ui { top: 10px; left: 10px; gap: 8px; }
            .icon-btn { padding: 6px 12px; font-size: 14px; }
            #top-right-ui { top: 10px; right: 10px; padding: 8px 15px; gap: 10px; font-size: 16px; border-radius: 15px;}
            .stat-item { font-size: 14px; }

            #right-panel {
                top: auto; bottom: 0; left: 0; right: 0; width: 100%;
                border-radius: 15px 15px 0 0; padding: 10px; gap: 8px;
                background: rgba(20, 20, 20, 0.95); border: none; border-top: 2px solid #555;
            }
            .panel-title { display: none; }
            
            .tower-buttons-container { grid-template-columns: repeat(3, 1fr); gap: 5px; }
            button.tower-btn { padding: 5px; font-size: 11px;}
            
            .action-buttons-container { flex-direction: row; gap: 5px; }
            .action-btn { margin-bottom: 0; padding: 8px 5px; font-size: 12px;}

            #upgrade-panel { position: absolute; bottom: 105%; left: 50%; transform: translateX(-50%); width: 250px; z-index: 10; }
            #bottom-left-ui { display: none; }
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="top-left-ui">
        <button id="btn-pause" class="icon-btn" onclick="togglePause()">⏸️ <span id="t-pause">Pausa</span></button>

        <div class="stat-item">💰 <span id="gold-display" style="color:white;">150</span></div>
    </div>

    <div id="right-panel">
        
        <div id="upgrade-panel">
            <h3 class="panel-title" id="t-selected" style="font-size:14px; margin-top:0;">Torre Sel.</h3>
            <p style="margin:5px 0;"><span id="t-lvl">Nvl:</span> <span id="tower-lvl"></span> | <span id="t-dmg">Daño:</span> <span id="tower-dmg"></span></p>
            <div style="display:flex; gap:5px; margin-top:8px;">
                <button id="upgrade-btn" class="action-btn" onclick="upgradeSelectedTower()" style="background: linear-gradient(145deg, #FF9800, #F57C00); color: black; flex:1; padding:5px;"></button>
                <button id="upgrade-max-btn" class="action-btn" onclick="maxUpgradeSelectedTower()" style="background: linear-gradient(145deg, #D32F2F, #B71C1C); color: white; flex:1; padding:5px;"></button>
            </div>
        </div>

        <h3 class="panel-title" id="t-build">Construir Torres</h3>
        
        <div class="tower-buttons-container">
            <button id="btn-basic" class="tower-btn selected" onclick="selectTower('basic')"></button>
            <button id="btn-laser" class="tower-btn" onclick="selectTower('laser')"></button>
            <button id="btn-rapid" class="tower-btn" onclick="selectTower('rapid')"></button>
            <button id="btn-sniper" class="tower-btn" onclick="selectTower('sniper')"></button>
            <button id="btn-heavy" class="tower-btn" onclick="selectTower('heavy')"></button>
            <button id="btn-titan" class="tower-btn" onclick="selectTower('titan')"></button>
        </div>

        <div class="action-buttons-container">
            <button id="next-wave-btn" class="action-btn start" onclick="startWave()"></button>
            <button id="rush-wave-btn" class="action-btn rush" onclick="rushWave()"></button>
            <button id="upgrade-all-btn" class="action-btn upgrade-all" onclick="upgradeAllTowers()"></button>
        </div>
    </div>

    <div id="bottom-left-ui">
        <h3 id="t-perm-title">Mejoras Permanentes</h3>
        <p><span id="t-perm-gold">+ Oro:</span> <span id="perm-gold">0</span></p>
        <p><span id="t-perm-lives">+ Vidas:</span> <span id="perm-lives">0</span></p>
        <p><span id="t-perm-tower">Torre:</span> <span id="perm-tower">-</span></p>
    </div>

    <div id="pause-indicator">PAUSA</div>

    <div id="settings-modal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="t-settings-title">Configuración</h2>
            
            <div class="setting-group">
                <label id="t-lang">🌐 Idiomas / Languages</label>
                <div class="btn-group">
                    <button id="lang-es" class="active" onclick="setLanguage('es')">ES</button>
                    <button id="lang-en" onclick="setLanguage('en')">EN</button>
                    <button id="lang-ja" onclick="setLanguage('ja')">JA</button>
                    <button id="lang-de" onclick="setLanguage('de')">DE</button>
                    <button id="lang-zh" onclick="setLanguage('zh')">ZH</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-map">🗺️ Mapa (Reinicia partida)</label>
                <div class="btn-group" style="flex-wrap: nowrap;">
                    <button id="btn-map1" class="active" onclick="setMap(0)">1 (Verde)</button>
                    <button id="btn-map2" onclick="setMap(1)">2 (Arena)</button>
                    <button id="btn-map3" onclick="setMap(2)">3 (Hielo)</button>
                    <button id="btn-map4" onclick="setMap(3)">4 (Lava)</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-diff">💀 Dificultad (Reinicia)</label>
                <div class="btn-group" style="flex-wrap: nowrap;">
                    <button id="btn-normal" class="active" onclick="setDifficulty('normal')">Normal</button>
                    <button id="btn-hard" class="hard" onclick="setDifficulty('hard')">Hard</button>
                    <button id="btn-bug" class="bug" onclick="setDifficulty('bug')">Bug</button>
                </div>
            </div>

            <div class="setting-group">
                <label id="t-accessibility">Accesibilidad</label>
                <button id="btn-colorblind" class="toggle-btn" onclick="toggleColorblind()">👁️ Modo Daltónico: OFF</button>
            </div>

            <button class="close-modal-btn" onclick="closeSettings()" id="t-close">Cerrar</button>
        </div>
    </div>

    <div id="game-over-overlay" class="modal-overlay">
        <div class="modal-content">
            <h1 id="t-game-over-title">Terminado</h1>
            <p id="game-over-text"></p>
            <p id="hard-death-text">Modo Hard: Sin mejoras permanentes.</p>
            <button id="play-again-btn" onclick="restartFromGameOver()"></button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

    let currentLang = 'es';
    let gameMode = 'normal'; 
    let currentMapIndex = 0;
    let isPaused = false;
    let isGameOver = false;
    let isColorblindMode = false; 

    let permanentUpgrades = { bonusGold: 0, bonusLives: 0, freeTower: null };

    // SCRIPT DE MIGRACIÓN Y GUARDADO V15
    function loadProgress() {
        let saved = localStorage.getItem('td_permanentUpgrades_v15');
        
        // MIGRACIÓN: Si no hay V15, buscar versiones anteriores (V14, V7, V6)
        if (!saved) {
            saved = localStorage.getItem('td_permanentUpgrades_v14') || 
                    localStorage.getItem('td_permanentUpgrades_v7') || 
                    localStorage.getItem('td_permanentUpgrades_v6') ||
                    localStorage.getItem('td_permanentUpgrades');
            
            if (saved) {
                // Guardar como V15 para el futuro
                localStorage.setItem('td_permanentUpgrades_v15', saved);
            }
        }
        
        if (saved) permanentUpgrades = JSON.parse(saved);
        
        const cbSaved = localStorage.getItem('td_colorblind');
        if (cbSaved) isColorblindMode = cbSaved === 'true';
    }
    
    function saveProgress() {
        localStorage.setItem('td_permanentUpgrades_v15', JSON.stringify(permanentUpgrades));
        localStorage.setItem('td_colorblind', isColorblindMode);
    }
    loadProgress();

    const canvas = document.getElementById('gameCanvas');

    function isPointOnPath(px, py) {
        const pathPoints = maps[currentMapIndex].points;
        const safeMargin = 22.5 + 15; 

        for (let i = 0; i < pathPoints.length - 1; i++) {
            const p1 = pathPoints[i];
            const p2 = pathPoints[i+1];
            const l2 = Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2);
            if (l2 === 0) continue;

            let t = ((px - p1.x) * (p2.x - p1.x) + (py - p1.y) * (p2.y - p1.y)) / l2;
            t = Math.max(0, Math.min(1, t));
            const projX = p1.x + t * (p2.x - p1.x);
            const projY = p1.y + t * (p2.y - p1.y);
            if (Math.hypot(px - projX, py - projY) < safeMargin) return true; 
        }
        return false;
    }

    // === CLASES ===
    class Enemy {
        constructor(type, hpMultiplier) {
            this.def = enemyDefinitions[type];
            this.hp = this.def.hp * hpMultiplier;
            this.maxHp = this.hp;
            this.speed = this.def.speed;
            this.radius = this.def.radius;
            
            // Map Oro Bonus
            this.reward = Math.floor(this.def.reward * maps[currentMapIndex].goldMult);
            
            this.waypointIndex = 0;
            const currentPath = maps[currentMapIndex].points;
            this.x = currentPath[0].x;
            this.y = currentPath[0].y;
        }

        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.beginPath();
            
            if (isColorblindMode && this.def.shape !== 'circle') {
                if (this.def.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y + this.radius);
                } else if (this.def.shape === 'square') {
                    ctx.rect(this.x - this.radius, this.y - this.radius, this.radius*2, this.radius*2);
                } else if (this.def.shape === 'diamond') {
                    ctx.moveTo(this.x, this.y - this.radius); ctx.lineTo(this.x + this.radius, this.y); ctx.lineTo(this.x, this.y + this.radius); ctx.lineTo(this.x - this.radius, this.y);
                } else if (this.def.shape === 'star') {
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.lineWidth = 4; ctx.strokeStyle = 'white'; ctx.stroke();
                }
            } else {
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            }
            ctx.fill();

            ctx.fillStyle = 'red'; ctx.fillRect(this.x - 15, this.y - 20, 30, 4);
            ctx.fillStyle = 'lightgreen'; ctx.fillRect(this.x - 15, this.y - 20, 30 * (this.hp / this.maxHp), 4);
        }

        update() {
            const currentPath = maps[currentMapIndex].points;
            const target = currentPath[this.waypointIndex + 1];
            if (!target) return;

            const dx = target.x - this.x;
            const dy = target.y - this.y;
            const dist = Math.hypot(dx, dy);

            if (dist < this.speed) {
                this.x = target.x; this.y = target.y; this.waypointIndex++;
                if (this.waypointIndex >= currentPath.length - 1) {
                    lives--; this.hp = 0; updateUI();
                    if (lives <= 0) {
                        if (gameMode === 'bug') handleGameOver(); 
                        else if (!isGameOver) handleGameOver(); 
                    }
                }
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
            }
        }
    }

    class Tower {
        constructor(x, y, type) {
            this.x = x; this.y = y; this.type = type;
            this.def = towerDefinitions[type];
            this.range = this.def.range; this.damage = this.def.damage;
            this.cooldown = this.def.cooldown; 
            this.timer = 0; this.level = 1; this.width = 30;
        }
        getUpgradeCost() { return Math.floor(this.def.cost * 0.8 * this.level); }
        upgrade() {
            const cost = this.getUpgradeCost();
            if (gold >= cost) {
                gold -= cost; this.level++;
                this.damage *= 1.3; this.range *= 1.05; 
                return true; 
            } return false;
        }
        draw() {
            ctx.fillStyle = isColorblindMode ? this.def.cbColor : this.def.color;
            ctx.fillRect(this.x - this.width/2, this.y - this.width/2, this.width, this.width);
            
            // DIBUJA EL EMOJI AL CENTRO DE LA TORRE PARA IDENTIFICAR FÁCILMENTE
            ctx.fillStyle = 'white'; 
            ctx.font = '16px Arial'; 
            ctx.textAlign = 'center';
            ctx.fillText(this.def.icon, this.x, this.y + 6);
            
            // Dibuja nivel
            ctx.font = 'bold 10px Arial';
            ctx.fillStyle = 'white';
            ctx.fillText("L" + this.level, this.x + 10, this.y + 14);
            
            if (selectedTowerInstance === this) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.8)'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.range, 0, Math.PI * 2); ctx.stroke();
            }
        }
        update() {
            if (this.timer > 0) this.timer--;
            if (this.timer === 0) {
                let target = null; let minDist = this.range;
                for (let e of enemies) {
                    let dist = Math.hypot(e.x - this.x, e.y - this.y);
                    if (dist < minDist) { minDist = dist; target = e; }
                }
                if (target) {
                    const pColor = isColorblindMode ? this.def.cbColor : this.def.color;
                    // Aplicar modificador de mapa al daño base del proyectil
                    const finalDamage = this.damage * maps[currentMapIndex].dmgMult;
                    projectiles.push(new Projectile(this.x, this.y, target, finalDamage, pColor));
                    this.timer = this.cooldown;
                }
            }
        }
    }

    class Projectile {
        constructor(x, y, target, damage, color) {
            this.x = x; this.y = y; this.target = target; this.damage = damage; 
            this.color = color; this.speed = 10;
        }
        draw() {
            ctx.fillStyle = this.color; 
            ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            const dx = this.target.x - this.x; const dy = this.target.y - this.y;
            const dist = Math.hypot(dx, dy);
            if (dist < this.speed) {
                this.target.hp -= this.damage;
                if (this.target.hp <= 0) { gold += this.target.reward; updateUI(); }
                return false; 
            } else {
                this.x += (dx / dist) * this.speed; this.y += (dy / dist) * this.speed;
                return true; 
            }
        }
    }

    function handleGameOver() {
        isGameOver = true;
        const overlay = document.getElementById('game-over-overlay');

            document.getElementById('hard-death-text').style.display = 'none';
            saveProgress();

        overlay.style.display = 'flex';

            isPaused = true;
            document.getElementById('pause-indicator').style.display = 'none';
        }
    }

    function resetGame(forceClean) {
        isGameOver = false;
        
        if (gameMode === 'hard' || forceClean) {
            gold = 150; lives = 20;
        } else {
            gold = 150 + permanentUpgrades.bonusGold;
            lives = 20 + permanentUpgrades.bonusLives;
        }
        
        wave = 0; enemies = []; towers = []; projectiles = [];
        enemiesToSpawn = []; isWaveActive = false; 
        
        selectedTowerType = null;
        selectedTowerInstance = null;
        document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
        
        isPaused = false;
        document.getElementById('pause-indicator').style.display = 'none';
        
        const btn = document.getElementById('btn-pause');
        btn.innerHTML = `⏸️ <span id="t-pause">${dict[currentLang].pause}</span>`;

        if (gameMode !== 'hard' && !forceClean && permanentUpgrades.freeTower) {
            towers.push(new Tower(100, 100, permanentUpgrades.freeTower));
        }
        updateUI();
    }

    // INTERACCIÓN CANVAS (COLISIÓN 1PX SEPARACIÓN)
    canvas.addEventListener('click', (e) => {
        if (isPaused || (isGameOver && gameMode !== 'bug')) return; 
        
        const rect = canvas.getBoundingClientRect();
        const scaleX = 800 / rect.width;
        const scaleY = 600 / rect.height;
        const mx = (e.clientX - rect.left) * scaleX; 
        const my = (e.clientY - rect.top) * scaleY;

        // 1. Verificar Selección de Torre Existente
        let clickedTower = null;
        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 20) {
                clickedTower = t;
                break;
            }
        }
        
        if (clickedTower) {
            selectedTowerInstance = clickedTower;
            updateUI();
            return;
        }

        // 2. Intentar colocar torre nueva
        if (!selectedTowerType) {
            selectedTowerInstance = null;
            updateUI();
            return;
        }

        // 3. Revisar Colisiones
        if (isPointOnPath(mx, my)) return; 
        
        // 1px Separation Check (30 width = 15 radius. 15+15+1 = 31)
        for (let t of towers) {
            if (Math.hypot(t.x - mx, t.y - my) < 31) {
                return; // Demasiado cerca de otra torre
            }
        }

        const def = towerDefinitions[selectedTowerType];
        if (def && gold >= def.cost) {
            towers.push(new Tower(mx, my, selectedTowerType));
            gold -= def.cost; 
            selectedTowerInstance = towers[towers.length - 1]; 
            
            selectedTowerType = null;
            document.querySelectorAll('.tower-btn').forEach(btn => btn.classList.remove('selected'));
            
            updateUI();
        }
    });

    function upgradeSelectedTower() {
        if (isPaused) return;
        if (selectedTowerInstance && selectedTowerInstance.upgrade()) updateUI();
    }

    function maxUpgradeSelectedTower() {
        if (isPaused || !selectedTowerInstance) return;
        let upgraded = false;
        while (gold >= selectedTowerInstance.getUpgradeCost()) {
            selectedTowerInstance.upgrade();
            upgraded = true;
        }
        if(upgraded) updateUI();
    }

    function upgradeAllTowers() {
        if (isPaused) return;
        let upgradedAny = false;
        for (let t of towers) {
            while (gold >= t.getUpgradeCost()) { t.upgrade(); upgradedAny = true; }
        }
        if (upgradedAny) updateUI();
    }

    function startWave() {
        if (lives <= 0 || isPaused) return;
        wave++; isWaveActive = true;
        
        let hpMultiplier = 1 + (wave * 0.2); 
        let count = 5 + (wave * 2);

        if (wave % 5 === 0) {
            if (wave >= 100) { enemiesToSpawn.push(new Enemy('omega_boss', hpMultiplier)); } 
            else { enemiesToSpawn.push(new Enemy('boss', hpMultiplier)); }
            count = Math.floor(count / 2); 
        }

        for (let i = 0; i < count; i++) {
            let r = Math.random();
            let type = 'normal';
            
            if (wave >= 100) {
                if (r > 0.8) type = 'mecha';
                else if (r > 0.6) type = 'phantom';
                else if (r > 0.4) type = 'mutant';
                else if (r > 0.3) type = 'tank';
                else if (r > 0.1) type = 'fast';
            } else {
                if (wave > 2 && r > 0.6) type = 'fast';
                if (wave > 3 && r > 0.8) type = 'tank';
            }
            
            enemiesToSpawn.push(new Enemy(type, hpMultiplier));
        }
        updateUI();
    }

    function rushWave() {
        if (lives <= 0 || isPaused) return;
        if (enemiesToSpawn.length === 0) startWave();
        let staggerDistance = 0; 
        while (enemiesToSpawn.length > 0) {
            let e = enemiesToSpawn.shift(); e.x -= staggerDistance; 
            enemies.push(e); staggerDistance += 12; 
        }
    }

    function gameLoop() {
        const currentMap = maps[currentMapIndex];
        ctx.fillStyle = currentMap.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = currentMap.pathColor; 
        ctx.lineWidth = 45; ctx.lineJoin = 'round';
        ctx.beginPath(); ctx.moveTo(currentMap.points[0].x, currentMap.points[0].y);
        for (let i = 1; i < currentMap.points.length; i++) {
            ctx.lineTo(currentMap.points[i].x, currentMap.points[i].y);
        }
        ctx.stroke();

        if (!isPaused) {
            if (isWaveActive) {
                spawnTimer++;
                if (spawnTimer > 60 && enemiesToSpawn.length > 0) {
                    enemies.push(enemiesToSpawn.shift()); spawnTimer = 0;
                } else if (enemiesToSpawn.length === 0 && enemies.length === 0) {
                    isWaveActive = false; 
                }
            }

            for (let t of towers) t.update();
            for (let i = projectiles.length - 1; i >= 0; i--) {
                if (projectiles[i].target.hp <= 0 || !projectiles[i].update()) projectiles.splice(i, 1);
            }
            for (let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].update();
                if (enemies[i].hp <= 0) enemies.splice(i, 1);
            }
        }

        for (let t of towers) t.draw();
        for (let p of projectiles) p.draw();
        for (let e of enemies) e.draw();

        requestAnimationFrame(gameLoop);
    }

    updateSettingsUI();
    resetGame(false);
    gameLoop();
</script>
